version: 2
updates:
  # 1. Monitor NuGet Packages for security only
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0 # Only security alerts, no automated version updates

  # 2. Monitor GitHub Actions for security only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0 # Only security alerts, no automated version updates