# ==============================================================================
# GitHub Composite Action - Setup Custom .NET
# ------------------------------------------------------------------------------
# Security: Prevents script injection by mapping user-controlled inputs 
# to environment variables and verifies the Microsoft Authenticode signature.
# ==============================================================================
name: 'Setup Custom .NET'
description: 'Installs a specific .NET SDK version using the dotnet-install script'

inputs:
  version:
    description: '.NET SDK version to install (e.g., 10.0.102). Pinning ensures reproducible builds.'
    required: true
    default: '10.0.202'

runs:
  using: "composite"
  steps:
    - name: Install .NET SDK
      shell: powershell
      env:
        DOTNET_VERSION: ${{ inputs.version }}
      run: |
        $ErrorActionPreference = "Stop"

        $url = "https://dot.net/v1/dotnet-install.ps1"
        $installDir = "$env:RUNNER_TEMP\dotnet"

        # 1. Download with retries
        $maxRetries = 5
        for ($i = 0; $i -lt $maxRetries; $i++) {
          curl.exe -L $url -o dotnet-install.ps1

          if ($LASTEXITCODE -eq 0) { break }
          if ($i -eq ($maxRetries - 1)) {
            throw "Failed to download dotnet-install.ps1 after $maxRetries attempts"
          }
          Start-Sleep -Seconds 3
        }
        
        # 2. SECURITY CHECK: Verify Microsoft Signature
        Write-Host "Verifying Authenticode signature of dotnet-install.ps1..."
        $sig = Get-AuthenticodeSignature ./dotnet-install.ps1
        
        if ($sig.Status -ne 'Valid') {
          throw "dotnet-install.ps1 signature check failed: $($sig.Status). The file may be compromised or unsigned."
        }
        
        if ($sig.SignerCertificate.Subject -notmatch 'O=Microsoft Corporation') {
          throw "dotnet-install.ps1 signature subject mismatch. Expected 'Microsoft Corporation', got: $($sig.SignerCertificate.Subject)"
        }
        Write-Host "Signature verified successfully."
        
        # 3. Installation
        if (!(Test-Path $installDir)) {
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        }

        # Execute the verified script
        powershell -ExecutionPolicy Bypass -File ./dotnet-install.ps1 `
          -Version "$env:DOTNET_VERSION" `
          -InstallDir $installDir

        if ($LASTEXITCODE -ne 0) {
          throw "dotnet-install.ps1 failed with exit code $LASTEXITCODE"
        }
        
        # 4. Finalize Environment
        $dotnet = Join-Path $installDir "dotnet.exe"
        if (!(Test-Path $dotnet)) {
          throw "dotnet was not installed correctly at $dotnet"
        }

        & $dotnet --version

        Add-Content -Path $env:GITHUB_PATH -Value $installDir
        Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

    - name: Check .NET version
      shell: pwsh
      run: dotnet --version