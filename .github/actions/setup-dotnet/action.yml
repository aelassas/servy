# ==============================================================================
# GitHub Composite Action — Setup Custom .NET
# ------------------------------------------------------------------------------
# Security: Prevents script injection by mapping user-controlled inputs 
# to environment variables instead of using inline expressions in 'run' blocks.
# ==============================================================================

name: 'Setup Custom .NET'
description: 'Installs a specific .NET SDK version using the dotnet-install script'

inputs:
  version:
    description: '.NET version to install'
    required: true
    default: '10.0'

runs:
  using: "composite"
  steps:
    - name: Install .NET SDK
      shell: powershell
      # Map the input to an env variable to prevent command injection
      env:
        DOTNET_VERSION: ${{ inputs.version }}
      run: |
        $ErrorActionPreference = "Stop"

        # Force TLS 1.2
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

        $url = "https://dot.net/v1/dotnet-install.ps1"
        $installDir = "$env:RUNNER_TEMP\dotnet"
        Invoke-WebRequest -Uri $url -OutFile "dotnet-install.ps1" -ErrorAction Stop
        
        # Use the environment variable in the script
        ./dotnet-install.ps1 -Channel "$env:DOTNET_VERSION" -InstallDir $installDir
        
        Add-Content -Path $env:GITHUB_PATH -Value $installDir

    - name: Check .NET version
      shell: pwsh
      run: dotnet --version