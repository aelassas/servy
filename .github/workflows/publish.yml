# ==========================================================================================
# Servy Publish Workflow (.NET Framework 4.8)
# ------------------------------------------------------------------------------------------
# Builds all Servy components using .NET Framework 4.8, signs all executables using SignPath,
# builds the installer, creates the portable 7z archive, and uploads all signed artifacts.
#
# This build targets legacy systems. .NET Framework 4.8 ensures compatibility with older
# Windows versions that cannot run modern .NET (e.g., Windows 7, 8, 8.1).
# ==========================================================================================

name: publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-sign:
    runs-on: windows-latest
    timeout-minutes: 60  # Prevents indefinite hangs if signing or VT APIs stall

    env:
      ROOT_DIR: ${{ github.workspace }}
      BUILD_CONFIG: Release
      PLATFORM: x64
      FRAMEWORK: net48
      ISCC: 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
      CYCLONEDX_VERSION: "6.2.0"
      
      # Binary Version & Checksum Pins
      CYCLONEDX_TOOL_HASH: "3473525381eee02a649b75bbf5b4f0ffa66112f62917aff798fed196e290a884" # the actual SHA256 hash of the CycloneDX nupkg
      CYCLONEDX_CLI_VERSION: "v0.31.0"
      CYCLONEDX_CLI_HASH: "da18bdb0d5b10a5f45ddfb59b7b08b11ddc050bb5c6407608d831929a1799d3f"
      INNO_SETUP_VERSION: "6.6.1"
      INNO_SETUP_HASH: "d243ce440c02705530699554fb9612b9b2bd7a2a90629cdb7f41e66f5faeb91f"
      SEVEN_ZIP_VERSION: "26.01"
      SEVEN_ZIP_HASH: "d64a0468f5b5b0b0fc5b2188450bcd655b70809d97b1c4535f2884635094377d"

    steps:
      # -----------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1
        with:
          fetch-depth: 0  # Required for provenance

      # -----------------------------------------------------
      # Extract Version from setup/publish.ps1
      # -----------------------------------------------------
      - name: Get version from publish.ps1
        id: get_version
        shell: pwsh
        run: |
          $publishFile = "setup/publish.ps1"
          if (-not (Test-Path $publishFile)) { throw "cannot find publish.ps1" }
          $line = Get-Content $publishFile | Where-Object { $_ -match '^\s*\$version\s*=\s*"(.*)"' }
          if (-not $line) { throw "Version line not found in $publishFile" }
          $v = ([regex]::Match($line, '"(.*)"')).Groups[1].Value
          if (-not $v) { throw "Failed to extract version" }
          Write-Host "Version found: $v"
          # proper output export
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$v"

      - name: Set VERSION env
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=${{ steps.get_version.outputs.version }}"

      - name: Verify VERSION is set
        shell: pwsh
        run: |
          if (-not $env:VERSION) { throw "VERSION env variable is not set." }
          Write-Host "VERSION is set to $env:VERSION"

      # -----------------------------------------------------
      # Install Build dependencies
      # -----------------------------------------------------
      - uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce #v2
      - uses: nuget/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f #v2.0.2

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check .NET version
        run: dotnet --version

      - name: Install CycloneDX .NET Tool
        shell: pwsh
        run: |
          # --- SECURITY CHECK: SHA256 PINNING FOR .NET TOOL ---
          Write-Host "Downloading CycloneDX .NET Tool package for verification..."
          $toolPkgUri = "https://www.nuget.org/api/v2/package/CycloneDX/$env:CYCLONEDX_VERSION"
          $toolPkgDir = "$env:USERPROFILE\cyclonedx-tool"
          New-Item -ItemType Directory -Force -Path $toolPkgDir | Out-Null
          $toolPkgPath = "$toolPkgDir\CycloneDX.$env:CYCLONEDX_VERSION.nupkg"
          Invoke-WebRequest -Uri $toolPkgUri -OutFile $toolPkgPath -ErrorAction Stop

          Write-Host "Verifying SHA256 checksum of CycloneDX .NET Tool package..."
          $actualToolHash = (Get-FileHash $toolPkgPath -Algorithm SHA256).Hash
          if ($actualToolHash -ne $env:CYCLONEDX_TOOL_HASH) {
              throw "Security Breach: CycloneDX .NET Tool hash mismatch! Expected: $($env:CYCLONEDX_TOOL_HASH), Got: $actualToolHash"
          }
          Write-Host "Tool package checksum verified successfully."
          # ----------------------------------------------------

          # Continue with the .NET tool installation using the verified local package source
          dotnet tool install --global CycloneDX --version $env:CYCLONEDX_VERSION --source $toolPkgDir --ignore-failed-sources
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"

      - name: Install CycloneDX CLI from GitHub
        shell: pwsh
        run: |
          $v = $env:CYCLONEDX_CLI_VERSION
          if (-not $v) { 
              throw "CYCLONEDX_CLI_VERSION environment variable not set" 
          }
          
          # Force a hard stop if the download fails (e.g., GitHub is down or version is wrong)
          $uri = "https://github.com/CycloneDX/cyclonedx-cli/releases/download/$v/cyclonedx-win-x64.exe"
          
          # Isolate the binary in a dedicated subfolder to prevent broad PATH exposure
          $cliDir = "$env:USERPROFILE\cyclonedx-cli"
          New-Item -ItemType Directory -Force -Path $cliDir | Out-Null
          $outPath = "$cliDir\cyclonedx.exe"
          
          Write-Host "Downloading CycloneDX CLI from $uri"
          Invoke-WebRequest -Uri $uri -OutFile $outPath -ErrorAction Stop
          
          # --- SECURITY CHECK: SHA256 PINNING ---
          Write-Host "Verifying SHA256 checksum of CycloneDX CLI..."
          $actualHash = (Get-FileHash $outPath -Algorithm SHA256).Hash
          
          # -ne in PowerShell is inherently case-insensitive
          if ($actualHash -ne $env:CYCLONEDX_CLI_HASH) {
              throw "Security Breach: CycloneDX CLI hash mismatch! Expected: $($env:CYCLONEDX_CLI_HASH), Got: $actualHash"
          }
          Write-Host "Checksum verified successfully."
          # --------------------------------------
          
          # Append only the isolated subfolder to PATH
          Add-Content -Path $env:GITHUB_PATH -Value $cliDir

      - name: Install Inno Setup from GitHub
        shell: pwsh
        run: |
          # 1. Define version and paths
          $version = $env:INNO_SETUP_VERSION
          $expectedHash = $env:INNO_SETUP_HASH
          
          # Convert "6.6.1" to "6_6_1" for the URL directory
          $urlVersion = $version.Replace(".", "_") 
          $url = "https://github.com/jrsoftware/issrc/releases/download/is-$urlVersion/innosetup-$version.exe"
          $installer = "innosetup.exe"
          
          Write-Host "Downloading Inno Setup v$version..."
          Invoke-WebRequest -Uri $url -OutFile $installer -ErrorAction Stop
          
          # --- SECURITY CHECK 1: SHA256 PINNING ---
          Write-Host "Verifying SHA256 checksum of Inno Setup..."
          $actualHash = (Get-FileHash $installer -Algorithm SHA256).Hash
          
          # -ne in PowerShell is inherently case-insensitive
          if ($actualHash -ne $expectedHash) {
              throw "Security Breach: Inno Setup hash mismatch! Expected: $expectedHash, Got: $actualHash"
          }
          Write-Host "Checksum verified successfully."
          # ----------------------------------------
          
          # --- SECURITY CHECK 2: AUTHENTICODE ---
          Write-Host "Verifying Authenticode signature of Inno Setup..."
          $sig = Get-AuthenticodeSignature $installer
          
          if ($sig.Status -ne 'Valid') { 
              throw "Inno Setup signature check failed: $($sig.Status). The file may be compromised." 
          }
          Write-Host "Signature verified successfully."
          # --------------------------------------

          Write-Host "Installing Inno Setup silently..."
          Start-Process ".\$installer" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES" -Wait
          if (-not (Test-Path $env:ISCC)) { throw "ISCC.exe not found at $env:ISCC" }

      - name: Install 7zip from GitHub
        shell: pwsh
        run: |
          # 1. Define version and paths
          $version = $env:SEVEN_ZIP_VERSION
          $fileVersion = $version.Replace(".", "") # Converts "26.01" to "2601"
          $url = "https://github.com/ip7z/7zip/releases/download/$version/7z$fileVersion-x64.exe"
          $installer = "7z_setup.exe"
          $installDir = "C:\7-Zip"
          $exePath = "$installDir\7z.exe"

          # 2. Download from GitHub Releases
          Write-Host "Downloading 7-Zip v$version..."
          Invoke-WebRequest -Uri $url -OutFile $installer -ErrorAction Stop

          # --- SECURITY CHECK: SHA256 PINNING ---
          Write-Host "Verifying SHA256 checksum of 7-Zip..."
          $actualHash = (Get-FileHash $installer -Algorithm SHA256).Hash
                
          # -ne in PowerShell is inherently case-insensitive
          if ($actualHash -ne $env:SEVEN_ZIP_HASH) {
              throw "Security Breach: 7-Zip hash mismatch! Expected: $($env:SEVEN_ZIP_HASH), Got: $actualHash"
          }
          Write-Host "Checksum verified successfully."
          # --------------------------------------

          # 3. Install silently to a fixed directory
          Write-Host "Installing to $installDir..."
          Start-Process ".\$installer" -ArgumentList "/S", "/D=$installDir" -Wait

          # 4. Set environment variable for the CURRENT session
          $env:SEVEN_ZIP = $exePath

          # 5. Set environment variable for FUTURE steps in the workflow
          echo "SEVEN_ZIP=$exePath" >> $env:GITHUB_ENV

          # 6. Verification & Version Check
          if (-not (Test-Path $env:SEVEN_ZIP)) { throw "7z.exe not found at $env:SEVEN_ZIP" }

          Write-Host "7-Zip installed successfully!"
          & $env:SEVEN_ZIP | Select-String "7-Zip"

      # -----------------------------------------------------
      # Build solution
      # -----------------------------------------------------
      - name: Build Servy.sln
        shell: pwsh
        run: |
          Write-Host "Restoring NuGet packages..."
          nuget restore "Servy.sln"

          Write-Host "Building Servy.sln..."
          msbuild Servy.sln `
            /t:Clean,Rebuild `
            /p:Configuration=$env:BUILD_CONFIG `
            /p:Platform=$env:PLATFORM `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # Run unit tests
      # -----------------------------------------------------
      - name: Run unit tests
        shell: pwsh
        run: |
          # Use vswhere to find the latest installed vstest.console.exe dynamically
          $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath

          if (-not $vsInstallPath) {
              throw "Visual Studio installation not found using vswhere."
          }

          $vsTest = Join-Path $vsInstallPath "Common7\IDE\Extensions\TestPlatform\vstest.console.exe"

          if (-not (Test-Path $vsTest)) {
              throw "Could not locate vstest.console.exe at expected path: $vsTest"
          }

          Write-Host "Using vstest.console.exe at: $vsTest"

          # Find all test assemblies using recursive search for resilience
          $testDlls = Get-ChildItem -Path "tests" -Include "*.UnitTests.dll","*.IntegrationTests.dll" -Recurse | 
            Where-Object { $_.FullName -like "*\bin\*$env:BUILD_CONFIG\*" }

          # Print matched assemblies for verification
          if ($testDlls) {
              Write-Host "Matched test assemblies:"
              $testDlls | ForEach-Object { Write-Host " - $($_.FullName)" }
          }

          if (-not $testDlls) {
              # Helpful debugging: List the tests directory so we can see the actual path in the logs
              Write-Host "Directory listing of 'tests' for debugging:"
              Get-ChildItem -Path "tests" -Recurse | Select-Object FullName
              throw "No test assemblies matching *Tests.dll found in bin/$env:BUILD_CONFIG"
          }

          Write-Host "Found test assemblies:"
          $testDlls | ForEach-Object { Write-Host " - $($_.FullName)" }

          foreach ($dll in $testDlls) {
              Write-Host "`nRunning tests in $($dll.FullName)..."
              & $vsTest $dll.FullName /Framework:".NETFramework,Version=v4.8" /logger:trx

              if ($LASTEXITCODE -ne 0) {
                  throw "Unit tests failed in $($dll.FullName)"
              }
          }
  
      # -----------------------------------------------------
      # Build and Publish SBOM
      # -----------------------------------------------------
      - name: Generate SBOM
        shell: pwsh
        run: |
          # Use subexpression operator $() to safely append the .0 suffix
          $version = "$($env:VERSION).0"
          
          $projects = @(
              @{ Path = 'src\Servy\Servy.csproj';                 File = 'sbom-Servy.xml' }
              @{ Path = 'src\Servy.CLI\Servy.CLI.csproj';         File = 'sbom-Servy.CLI.xml' }
              @{ Path = 'src\Servy.Manager\Servy.Manager.csproj'; File = 'sbom-Servy.Manager.xml' }
              @{ Path = 'src\Servy.Restarter\Servy.Restarter.csproj'; File = 'sbom-Servy.Restarter.xml' }
              @{ Path = 'src\Servy.Service\Servy.Service.csproj'; File = 'sbom-Servy.Service.xml' }
          )
          
          # Explicitly check for native command failures to prevent partial SBOMs
          foreach ($p in $projects) {
              dotnet-CycloneDX $p.Path --recursive --set-version "$version" --output . --filename $p.File
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "dotnet-CycloneDX failed for $($p.Path) (exit $LASTEXITCODE)"
                  exit $LASTEXITCODE
              }
          }
          
          $outputFile = "servy-$($env:VERSION)-$($env:FRAMEWORK)-sbom.xml"
          
          # Merge into servy-$env:VERSION-$env:FRAMEWORK-sbom.xml
          cyclonedx merge --input-files `
            sbom-Servy.xml `
            sbom-Servy.CLI.xml `
            sbom-Servy.Manager.xml `
            sbom-Servy.Restarter.xml `
            sbom-Servy.Service.xml `
            --output-file "$outputFile"

          if ($LASTEXITCODE -ne 0) {
              Write-Error "cyclonedx merge failed (exit $LASTEXITCODE)"
              exit $LASTEXITCODE
          }

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: sbom-${{ env.VERSION }}-${{ env.FRAMEWORK }}-sbom
          path: servy-${{ env.VERSION }}-${{ env.FRAMEWORK }}-sbom.xml
          if-no-files-found: error
          retention-days: 1

      # -----------------------------------------------------
      # Build UNSIGNED Servy.Restarter.exe
      # -----------------------------------------------------
      - name: Build Servy.Restarter.exe
        shell: pwsh
        run: |
          $buildConfiguration = $env:BUILD_CONFIG
          $platform           = $env:PLATFORM
          $projectPath        = "src/Servy.Restarter/Servy.Restarter.csproj"

          msbuild $projectPath `
            /t:Clean,Rebuild `
            /p:Configuration=$buildConfiguration `
            /p:Platform=$platform `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # SIGN Servy.Restarter.exe
      # -----------------------------------------------------
      - name: Upload Servy.Restarter.exe (unsigned)
        id: unsigned-restarter
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-restarter
          path: src/Servy.Restarter/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}/Servy.Restarter.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Servy.Restarter.exe for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-restarter.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy-restarter'
          wait-for-completion: true
          output-artifact-directory: 'signed/Servy.Restarter'

      - name: Inject signed Servy.Restarter.exe
        shell: pwsh
        run: |
          $file = "signed/Servy.Restarter/Servy.Restarter.exe"
          if (-not (Test-Path $file)) { throw "Signed Servy.Restarter.exe not found!" }
          Copy-Item $file src/Servy.Service/Resources/Servy.Restarter.Net48.exe -Force

      # -----------------------------------------------------
      # Build UNSIGNED Servy.Service.exe
      # -----------------------------------------------------
      - name: Build Servy.Service.exe
        shell: pwsh
        run: |
          $buildConfiguration = $env:BUILD_CONFIG
          $platform           = $env:PLATFORM
          $projectPath        = "src/Servy.Service/Servy.Service.csproj"

          msbuild $projectPath `
            /t:Clean,Rebuild `
            /p:Configuration=$buildConfiguration `
            /p:Platform=$platform `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # SIGN Servy.Service.exe
      # -----------------------------------------------------
      - name: Upload Servy.Service.exe (unsigned)
        id: unsigned-service
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-service
          path: src/Servy.Service/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}/Servy.Service.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Servy.Service.exe for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-service.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy-service'
          wait-for-completion: true
          output-artifact-directory: 'signed/Servy.Service'

      - name: Inject signed Servy.Service.exe
        shell: pwsh
        run: |
          $signed = "signed/Servy.Service/Servy.Service.exe"
          if (-not (Test-Path $signed)) { throw "Signed Servy.Service.exe not found!" }

          $targets = @(
              @{ Path = "src/Servy/Resources";           Name = "Servy.Service.Net48.exe" },
              @{ Path = "src/Servy.Manager/Resources";   Name = "Servy.Service.Net48.exe" },
              @{ Path = "src/Servy.CLI/Resources";       Name = "Servy.Service.Net48.CLI.exe" }
          )

          # Inject the signed EXE into each resource folder
          foreach ($t in $targets) {
              $dst = Join-Path $t.Path $t.Name
              Write-Host "Injecting SIGNED Servy.Service.exe into $dst"
              Copy-Item $signed $dst -Force
              Copy-Item "src/Servy.Service/bin/$env:PLATFORM/$env:BUILD_CONFIG/*.dll" $t.Path -Force -ErrorAction Stop
          }

      # -----------------------------------------------------
      # Build UNSIGNED Servy.exe
      # -----------------------------------------------------
      - name: Build Servy.exe
        shell: pwsh
        run: |
          $buildConfiguration = $env:BUILD_CONFIG
          $platform           = $env:PLATFORM
          $projectPath        = "src/Servy/Servy.csproj"

          msbuild $projectPath `
            /t:Clean,Rebuild `
            /p:Configuration=$buildConfiguration `
            /p:Platform=$platform `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # SIGN Servy.exe
      # -----------------------------------------------------
      - name: Upload Servy.exe (unsigned)
        id: unsigned-servy
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-servy
          path: src/Servy/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}/Servy.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Servy.exe for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-servy.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy'
          wait-for-completion: true
          output-artifact-directory: 'signed/Servy'

      - name: Inject signed Servy.exe
        shell: pwsh
        run: |
          $file = "signed/Servy/Servy.exe"
          if (-not (Test-Path $file)) { throw "Signed Servy.exe not found!" }
          Copy-Item $file src/Servy/bin/$env:PLATFORM/$env:BUILD_CONFIG/Servy.exe -Force

      # -----------------------------------------------------
      # Build UNSIGNED Servy.Manager.exe
      # -----------------------------------------------------
      - name: Build Servy.Manager.exe
        shell: pwsh
        run: |
          $buildConfiguration = $env:BUILD_CONFIG
          $platform           = $env:PLATFORM
          $projectPath        = "src/Servy.Manager/Servy.Manager.csproj"

          msbuild $projectPath `
            /t:Clean,Rebuild `
            /p:Configuration=$buildConfiguration `
            /p:Platform=$platform `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # SIGN Servy.Manager.exe
      # -----------------------------------------------------
      - name: Upload Servy.Manager.exe (unsigned)
        id: unsigned-manager
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-manager
          path: src/Servy.Manager/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}/Servy.Manager.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Servy.Manager.exe for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-manager.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy-manager'
          wait-for-completion: true
          output-artifact-directory: 'signed/Servy.Manager'

      - name: Inject signed Servy.Manager.exe
        shell: pwsh
        run: |
          $file = "signed/Servy.Manager/Servy.Manager.exe"
          if (-not (Test-Path $file)) { throw "Signed Servy.Manager.exe not found!" }
          Copy-Item $file src/Servy.Manager/bin/$env:PLATFORM/$env:BUILD_CONFIG/Servy.Manager.exe -Force

      # -----------------------------------------------------
      # Build UNSIGNED Servy.CLI.exe
      # -----------------------------------------------------
      - name: Build Servy.CLI.exe
        shell: pwsh
        run: |
          $buildConfiguration = $env:BUILD_CONFIG
          $platform           = $env:PLATFORM
          $projectPath        = "src/Servy.CLI/Servy.CLI.csproj"

          msbuild $projectPath `
            /t:Clean,Rebuild `
            /p:Configuration=$buildConfiguration `
            /p:Platform=$platform `
            /p:AllowUnsafeBlocks=true

      # -----------------------------------------------------
      # SIGN Servy.CLI.exe
      # -----------------------------------------------------
      - name: Upload Servy.CLI.exe (unsigned)
        id: unsigned-cli
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-cli
          path: src/Servy.CLI/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}/Servy.CLI.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Servy.CLI.exe for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-cli.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy-cli'
          wait-for-completion: true
          output-artifact-directory: 'signed/Servy.CLI'

      - name: Inject signed Servy.CLI.exe
        shell: pwsh
        run: |
          $file = "signed/Servy.CLI/Servy.CLI.exe"
          if (-not (Test-Path $file)) { throw "Signed Servy.CLI.exe not found!" }
          Copy-Item $file src/Servy.CLI/bin/$env:PLATFORM/$env:BUILD_CONFIG/Servy.CLI.exe -Force

      # -----------------------------------------------------
      # Build UNSIGNED installer
      # -----------------------------------------------------
      - name: Build unsigned installer
        shell: pwsh
        run: |
          & "$env:ISCC" "setup\servy.iss" `
            /DMyAppVersion=$env:VERSION `
            /DMyAppPlatform=$env:FRAMEWORK

      # -----------------------------------------------------
      # SIGN installer
      # -----------------------------------------------------
      - name: Prepare unsigned installer for signing
        shell: pwsh
        run: |
          # Note the inclusion of $env:FRAMEWORK in the original path
          $originalPath = "setup/servy-$env:VERSION-$env:FRAMEWORK-x64-installer.exe"
          $signPathName = "servy-x64-installer.exe"
          $unsignedDir = "unsigned_installer_staging"
          $signPathTarget = "$unsignedDir/$signPathName"
          
          if (-not (Test-Path $originalPath)) { throw "Unsigned installer not found: $originalPath" }
          
          # Isolate into a clean directory to prevent path confusion
          New-Item -ItemType Directory -Force -Path $unsignedDir | Out-Null
          Move-Item -Path $originalPath -Destination $signPathTarget -Force
          
          # Export explicit paths for downstream steps
          echo "UNSIGNED_INSTALLER_PATH=$signPathTarget" >> $env:GITHUB_ENV
          echo "SIGNED_INSTALLER_DIR=signed/installer" >> $env:GITHUB_ENV

      - name: Upload installer (unsigned)
        id: unsigned-installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: unsigned-installer
          path: ${{ env.UNSIGNED_INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 1

      - name: Submit installer for signing
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd #v2.x
        with:
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: '${{ steps.unsigned-installer.outputs.artifact-id }}'
          artifact-configuration-slug: 'servy-installer'
          wait-for-completion: true
          output-artifact-directory: ${{ env.SIGNED_INSTALLER_DIR }}

      - name: Prepare signed installer for release
        shell: pwsh
        run: |
          $source = "$env:SIGNED_INSTALLER_DIR/servy-x64-installer.exe"
          $targetDir = "release_installer_staging"
          # Re-inject the framework tag into the final release name
          $targetPath = "$targetDir/servy-$env:VERSION-$env:FRAMEWORK-x64-installer.exe"
          
          if (-not (Test-Path $source)) { throw "Signed installer not found: $source" }
          
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Move-Item -Path $source -Destination $targetPath -Force
          
          # Export the final artifact path
          echo "FINAL_INSTALLER_PATH=$targetPath" >> $env:GITHUB_ENV

      - name: Upload signed installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: signed-installer
          path: ${{ env.FINAL_INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 1

      # -----------------------------------------------------
      # Build portable 7z package
      # -----------------------------------------------------
      - name: Build portable 7z package
        shell: pwsh
        run: |
          $name = "servy-$env:VERSION-$env:FRAMEWORK-x64-portable"
          $pkg = "$name"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null

          $servy = "src/Servy/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}"
          $cli = "src/Servy.CLI/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}"
          $manager = "src/Servy.Manager/bin/${{ env.PLATFORM }}/${{ env.BUILD_CONFIG }}"

          # Desktop app and Manager app
          Copy-Item "$servy\*" $pkg -Recurse -Force
          Copy-Item "$manager\*" $pkg -Recurse -Force

          # CLI
          Copy-Item "$cli\*" "$pkg" -Recurse -Force
          
          # Rename Servy.CLI.exe to servy-cli.exe
          $sourceExe  = Join-Path $pkg "Servy.CLI.exe"
          $targetName = "servy-cli.exe"

          if (Test-Path $sourceExe) {
              Rename-Item -Path $sourceExe -NewName $targetName -Force
          } else {
              Write-Error "Servy.CLI.exe not found in $pkg"
          }

          # PowerShell module
          Copy-Item "src/Servy.CLI/Servy.psm1" $pkg -Force
          Copy-Item "src/Servy.CLI/Servy.psd1" $pkg -Force
          Copy-Item "src/Servy.CLI/servy-module-examples.ps1" $pkg -Force
          
          # Remove *.pdb, *.config, *.xml files
          $exts = @("*.pdb", "*.config", "*.xml")
          foreach ($ext in $exts) {
              Get-ChildItem -Path $pkg -Recurse -Filter $ext -File | Remove-Item -Force
          }

          # Task Scheduler setup - Hardened Recursive Copy
          $destPath = Join-Path $pkg "taskschd"
          $sourcePath = "setup\taskschd"
          if (-not (Test-Path $destPath)) { New-Item -Path $destPath -ItemType Directory -Force }

          Get-ChildItem -Path $sourcePath -Recurse -File |
              Where-Object { $_.Name -notin @('smtp-cred.xml') -and $_.Extension -notin @('.dat','.log') } |
              ForEach-Object {
                  # Maintain the internal folder hierarchy relative to the source path
                  $rel = $_.FullName.Substring((Resolve-Path $sourcePath).Path.Length + 1)
                  $target = Join-Path $destPath $rel
                  $parent = Split-Path $target -Parent

                  # Ensure the subfolder exists in the package before copying the file
                  if (-not (Test-Path $parent)) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
                  
                  Copy-Item -Path $_.FullName -Destination $target -Force
              }

          $zip = "$name.7z"

          # Use advanced compression config
          & "$env:SEVEN_ZIP" a `
            -t7z `
            -m0=lzma2 `
            -mx=9 `
            -mfb=273 `
            -md=64m `
            -ms=on `
            "$zip" `
            "$pkg"

          Remove-Item $pkg -Recurse -Force

      - name: Upload portable package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: portable-7z
          path: servy-${{ env.VERSION }}-${{ env.FRAMEWORK }}-x64-portable.7z
          if-no-files-found: error
          retention-days: 1

      # -----------------------------------------------------
      # Scan with VirusTotal
      # -----------------------------------------------------
      - name: Scan Signed Installer with VirusTotal
        id: vt_installer
        uses: cssnr/virustotal-action@e2d194486614b28c3cf884f4bf13e39cac959b8d #v1.7.0
        continue-on-error: true # Don't kill the whole CI if VT is down
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          sha256: true
          # Dynamically grab the exact path generated during the release prep
          file_globs: |
            ${{ env.FINAL_INSTALLER_PATH }}

      - name: Check VT Status
        if: steps.vt_installer.outcome == 'failure'
        run: echo "::warning::VirusTotal scan for installer failed or timed out."

      - name: Cool down API
        run: Start-Sleep -s 15
        shell: pwsh

      - name: Scan Portable Package with VirusTotal
        id: vt_portable
        uses: cssnr/virustotal-action@e2d194486614b28c3cf884f4bf13e39cac959b8d #v1.7.0
        continue-on-error: true # Don't kill the whole CI if VT is down
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          sha256: true
          file_globs: | 
            servy-${{ env.VERSION }}-${{ env.FRAMEWORK }}-x64-portable.7z

      - name: Check VT Status
        if: steps.vt_portable.outcome == 'failure'
        run: echo "::warning::VirusTotal scan for portable failed or timed out."