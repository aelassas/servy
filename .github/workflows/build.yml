# ===========================================
# GitHub Actions Workflow - Build (net48)
# -------------------------------------------
# Builds the Servy solution targeting .NET Framework 4.8
# and verifies critical reflection hooks.
# ===========================================

name: build

on:
  push:
    branches:
      - net48
  pull_request:
    branches:
      - net48
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce #v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f #v2.0.2

      - name: Restore NuGet packages
        run: nuget restore Servy.sln

      - name: Build Solution (Debug)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m

      - name: Build Solution (Release)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m
