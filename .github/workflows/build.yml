# ===========================================
# GitHub Actions Workflow - Build (net48)
# -------------------------------------------
# Builds the Servy solution targeting .NET Framework 4.8
# and verifies critical reflection hooks.
# ===========================================

name: build

on:
  push:
    branches:
      - net48
  pull_request:
    branches:
      - net48
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore Servy.sln

      - name: Build Solution (Release)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m
