# ==========================================================================================
# GitHub Actions Workflow - Build Matrix
# ------------------------------------------------------------------------------------------
# Builds and validates the Servy .NET solution across both x64 and ARM64 target platforms
# natively on native Windows host environments.
# ==========================================================================================

name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false  # Ensure a failure on one architecture doesn't cancel the other job
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            arch: x64
          - os: windows-11-arm
            runtime: win-arm64
            arch: ARM64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Restore dependencies
        run: dotnet restore Servy.sln

      - name: Build solution (Debug)
        run: dotnet build Servy.sln --configuration Debug --no-restore

      - name: Build Servy projects (Release ${{ matrix.arch }})
        shell: pwsh
        run: |
          $config = "Release"
          $runtime = "${{ matrix.runtime }}"
          
          $projects = @(
            "src\Servy.Restarter\Servy.Restarter.csproj",
            "src\Servy.Service\Servy.Service.csproj",
            "src\Servy\Servy.csproj",
            "src\Servy.CLI\Servy.CLI.csproj",
            "src\Servy.Manager\Servy.Manager.csproj"
          )

          foreach ($proj in $projects) {
            Write-Host "Restoring $proj for $runtime..."
            dotnet restore $proj --runtime $runtime
            if ($LASTEXITCODE -ne 0) {
                Write-Error "Restore failed for $proj"
                exit $LASTEXITCODE
            }
          }

          foreach ($proj in $projects) {
            Write-Host "Building $proj ($config) for $runtime..."
            # Explicitly tracks matrix parameters for un-emulated native optimization outputs
            dotnet build $proj --configuration $config --runtime $runtime --no-restore
            
            if ($LASTEXITCODE -ne 0) { 
                Write-Error "Build failed for $proj"
                exit $LASTEXITCODE 
            }
          }