name: changelog

on:
  # release:
  #   types: [published]
  workflow_run:             # auto-trigger after bump-version.yml
    workflows: ["bump-version"]    # must match the `name:` in bump-version.yml
    types:
      - completed

  workflow_dispatch:
    inputs:
      reset:
        description: 'Rebuild all servy CHANGELOG.md'
        required: false
        type: boolean
        default: false

# Default to read-only for the entire workflow
permissions:
  contents: read

jobs:
  changelog:
    runs-on: windows-latest
    # Logic: Only run if manually triggered OR if the automated upstream 'bump-version' run succeeded.
    if: >
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    # Explicitly elevate for this job only to allow the push
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main # Force checkout of the main branch, not the release tag
          
      - name: Update CHANGELOG.md
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RESET: ${{ inputs.reset == true }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $changelogPath = "CHANGELOG.md"
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)

          Write-Host "Fetching releases for $repo..."
          # Filter out drafts ($_.draft -eq $false) to avoid empty 'published_at' strings
          # Wrap in @() to guarantee an array even if only 1 release exists
          $releases = @(gh api repos/$repo/releases --paginate | ConvertFrom-Json | Where-Object { $_.draft -eq $false })

          if ($null -eq $releases -or $releases.Count -eq 0) {
              Write-Host "No releases found. Exiting."
              exit 0
          }

          Function Get-ReleaseEntry {
              param($Release, $PrevRelease)

              $title = if ([string]::IsNullOrWhiteSpace($Release.name)) { $Release.tag_name } else { $Release.name }
              $url = $Release.html_url
              
              # Safely parse the date, falling back to "Pending" if missing (e.g., edge cases)
              $date = if (![string]::IsNullOrWhiteSpace($Release.published_at)) { 
                  [datetime]::Parse($Release.published_at).ToString("yyyy-MM-dd") 
              } else { 
                  "Pending" 
              }
              
              $tag = $Release.tag_name
              $body = if ([string]::IsNullOrWhiteSpace($Release.body)) { "*No release notes provided.*" } else { $Release.body.Trim() }

              $bt = [char]96 

              $md = "## [$title]($url)`n`n"
              $md += "**Date:** $date | **Tag:** [$bt$tag$bt](https://github.com/$repo/tree/$tag)`n`n"
              $md += "$body`n`n"
              $md += "### Downloads`n"

              foreach ($asset in $Release.assets) {
                  $aName = $asset.name
                  $aUrl = $asset.browser_download_url
                  $size = [math]::Round($asset.size / 1MB, 2)
                  $md += "* [$aName]($aUrl) - ${size} MB`n"
              }

              $md += "* [Source code (zip)]($($url.Replace('/releases/tag/', '/archive/refs/tags/')).zip)`n"
              $md += "* [Source code (tar.gz)]($($url.Replace('/releases/tag/', '/archive/refs/tags/')).tar.gz)`n`n"

              if ($null -ne $PrevRelease) {
                  $prevTag = $PrevRelease.tag_name
                  $md += "Compare changes: https://github.com/$repo/compare/$prevTag...$tag`n`n"
              }

              return $md
          }

          $isReset = ($env:IS_RESET -eq 'true')
          $bt = [char]96

          if ($isReset) {
              Write-Host "Reset flag is true. Rebuilding full CHANGELOG.md..."
              $fullLog = "# Changelog`n`n"
              for ($i = 0; $i -lt $releases.Count; $i++) {
                  $prev = if ($i + 1 -lt $releases.Count) { $releases[$i+1] } else { $null }
                  $fullLog += Get-ReleaseEntry -Release $releases[$i] -PrevRelease $prev
              }
              [System.IO.File]::WriteAllText($changelogPath, $fullLog, $utf8NoBom)
          } else {
              $latest = $releases[0]
              $tag = $latest.tag_name
              
              $existing = ""
              if ([System.IO.File]::Exists($changelogPath)) {
                  $existing = [System.IO.File]::ReadAllText($changelogPath, $utf8NoBom)
              }

              # Safety check to prevent duplicating the release entry
              $tagLine = "**Tag:** [$bt$tag$bt](https://github.com/$repo/tree/$tag)"
              if ($existing.Contains($tagLine)) {
                  Write-Host "Release $tag is already in the CHANGELOG. No updates needed."
              } else {
                  Write-Host "Appending latest release ($tag) to top of CHANGELOG.md..."
                  $prev = if ($releases.Count -gt 1) { $releases[1] } else { $null }
                  $entry = Get-ReleaseEntry -Release $latest -PrevRelease $prev

                  if ($existing -match '(?s)^# Changelog¥r?¥n(.*)$') {
                      $newLog = "# Changelog`n`n$entry" + $matches[1].TrimStart()
                  } else {
                      $newLog = "# Changelog`n`n$entry$existing"
                  }
                  [System.IO.File]::WriteAllText($changelogPath, $newLog, $utf8NoBom)
              }
          }

      - name: Commit and Push
        shell: pwsh
        run: |
          # Disable CRLF warnings
          git config core.autocrlf false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          
          # Quietly check if there are any staged changes
          git diff --staged --quiet
          
          if ($LASTEXITCODE -eq 0) {
              Write-Host "No changes to commit. The CHANGELOG.md is already up to date."
          } else {
              git commit -m "docs: auto-update CHANGELOG.md"
              
              # Pull any recent changes to avoid push rejections
              git pull origin main --rebase 
              
              git push
          }