# ==========================================================
# GitHub Actions Workflow - Build (ARM64 Native)
# ----------------------------------------------------------
# Builds the Servy .NET solution natively on Windows ARM64.
# ==========================================================
name: build-arm64

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on Windows ARM64
    # Targeted flag for native ARM64 Windows host execution
    runs-on: windows-11-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore Servy.sln

      - name: Build solution (Debug)
        run: dotnet build Servy.sln --configuration Debug --no-restore

      - name: Build Servy projects (Release ARM64)
        shell: pwsh
        run: |
          $config = "Release"
          $runtime = "win-arm64"
          
          $projects = @(
            "src\Servy.Restarter\Servy.Restarter.csproj",
            "src\Servy.Service\Servy.Service.csproj",
            "src\Servy\Servy.csproj",
            "src\Servy.CLI\Servy.CLI.csproj",
            "src\Servy.Manager\Servy.Manager.csproj"
          )

          foreach ($proj in $projects) {
            Write-Host "Restoring $proj for $runtime..."
            dotnet restore $proj --runtime $runtime
            if ($LASTEXITCODE -ne 0) {
                Write-Error "Restore failed for $proj"
                exit $LASTEXITCODE
            }
          }

          foreach ($proj in $projects) {
            Write-Host "Building $proj ($config) for $runtime..."
            # We pass the native win-arm64 runtime here to produce un-emulated binaries
            dotnet build $proj --configuration $config --runtime $runtime --no-restore
            
            if ($LASTEXITCODE -ne 0) { 
                Write-Error "Build failed for $proj"
                exit $LASTEXITCODE 
            }
          }