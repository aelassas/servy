# ===============================================
# GitHub Actions Workflow - LoC
# -----------------------------------------------
# Calculates lines of code for:
# - Production code
# - Test code
# - Total code
# Generates badges and deploys them to the "loc"
# branch for README / documentation usage.
# ===============================================

name: loc

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # Required for peaceiris/actions-gh-pages to push badges

env:
  LOC_BADGE_COLOR: green

jobs:
  loc_job:
    runs-on: ubuntu-latest
    name: Generate LoC badges

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      # ----------------------------
      # Production LoC
      # ----------------------------
      - name: Create prod LoC badge
        uses: shadowmoose/GHA-LoC-Badge@8c8191e02ebe2e4b4764f4711228bddcaeb88f19 #v1.0.0
        id: loc_prod
        with:
          debug: true
          directory: ./
          badge_label: 'LoC prod'
          badge_color: ${{ env.LOC_BADGE_COLOR }}
          badge: ./output/loc-prod.svg
          ignore: '.gitignore|*.txt|.github|setup|tests|bin|obj|*.ico|*.ps1|*.psm1|*.bat|*.csproj|*.sln|*.md|*.yml|*.pdb|*.dll|*.exe|*.Designer.cs|*.g.cs|*.resx|*.manifest|*.json|*.png'

      # ----------------------------
      # Tests LoC
      # ----------------------------
      - name: Create tests LoC badge
        uses: shadowmoose/GHA-LoC-Badge@8c8191e02ebe2e4b4764f4711228bddcaeb88f19 #v1.0.0
        id: loc_tests
        with:
          debug: true
          directory: ./
          badge_label: 'LoC tests'
          badge_color: ${{ env.LOC_BADGE_COLOR }}
          badge: ./output/loc-tests.svg
          ignore: '.gitignore|*.txt|.github|setup|tests/data|src|bin|obj|*.ico|*.ps1|*.psm1|*.bat|*.csproj|*.sln|*.md|*.yml|*.pdb|*.dll|*.exe|*.Designer.cs|*.g.cs|*.resx|*.manifest|*.json|*.png'

      # ----------------------------
      # Total LoC
      # ----------------------------
      - name: Create total LoC badge
        id: loc_total
        run: |
          # Compute total
          TOTAL=$(( ${{ steps.loc_prod.outputs.total_lines }} + ${{ steps.loc_tests.outputs.total_lines }} ))
          echo "Total LoC: $TOTAL"

          # Force locale for printf to add commas
          export LC_ALL=en_US.UTF-8
          TOTAL_COMMA=$(printf "%'d" $TOTAL)
          echo "Formatted total: $TOTAL_COMMA"

          # Set output for later steps
          echo "total_lines=$TOTAL" >> $GITHUB_OUTPUT

          # Ensure output directory exists
          mkdir -p ./output

          # Use shields.io static badge generation with URL-encoded label
          # Escape commas to ensure strict RFC 3986 compliance
          ENCODED_TOTAL=$(echo "$TOTAL_COMMA" | sed 's/,/%2C/g')
          
          URL="https://img.shields.io/badge/LoC%20total-${ENCODED_TOTAL}-${{ env.LOC_BADGE_COLOR }}"
          echo "URL: ${URL}"

          # Fail step on HTTP errors (-f) and show errors (-S) to prevent publishing garbage
          curl -fsS -o ./output/loc-total.svg "${URL}"

      # ----------------------------
      # Summary
      # ----------------------------
      - name: Summary
        run: |
          PROD=${{ steps.loc_prod.outputs.total_lines }}
          TESTS=${{ steps.loc_tests.outputs.total_lines }}
          TOTAL=${{ steps.loc_total.outputs.total_lines }}

          echo "### LoC Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Prod:  $PROD lines" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: $TESTS lines" >> $GITHUB_STEP_SUMMARY
          echo "- Total: $TOTAL lines" >> $GITHUB_STEP_SUMMARY

      # ----------------------------
      # Deploy badges
      # ----------------------------
      - name: Deploy to loc branch
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 #v3.9.3
        with:
          publish_dir: ./output
          publish_branch: loc
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com