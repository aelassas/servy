# ===========================================
# GitHub Actions Workflow - Security Audit
# -------------------------------------------
# Performs security checks for the Servy project:
# 1. Dependency Scanning (NuGet Audit)
# 2. Static Analysis (CodeQL)
# 3. Secret Scanning (Gitleaks)
# ===========================================

name: security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 4 * * 1' # Runs every Monday at 04:30 UTC
  workflow_dispatch:

# Set base permissions for the entire workflow to read-only
permissions:
  contents: read

# Ensure only one concurrent deployment runs at a time
#concurrency:
  #group: security-audit-${{ github.ref }}
  #cancel-in-progress: true

jobs:
  # 1. Dependency Scanning
  # Uses native .NET NuGet Audit to check for vulnerable packages
  dependency-scan:
    timeout-minutes: 10
    name: Dependency Scanning
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Servy.sln

      - name: Scan for vulnerable packages
        shell: pwsh
        run: |
          # ROBUSTNESS: Pin execution language to English to ensure stable diagnostic pipelines
          $env:DOTNET_CLI_UI_LANGUAGE = 'en'

          # Fetch structured analysis data directly via JSON serialization to avoid brittle string matching
          $rawJson = dotnet list Servy.sln package --vulnerable --include-transitive --format json
          
          if ($LASTEXITCODE -ne 0) { throw "dotnet list package --vulnerable failed (exit $LASTEXITCODE)." }

          # Pass the raw array through the pipeline instead of using -InputObject.
          # The pipeline streams the strings sequentially, and ConvertFrom-Json automatically
          # reassembles them into a single coherent JSON block.
          $json = $rawJson | ConvertFrom-Json
          $hasVuln = $false

          # Explicitly walk the object graph to inspect dependency payloads across all frameworks
          if ($json -and $json.projects) {
            foreach ($proj in $json.projects) {
              foreach ($fw in $proj.frameworks) {
                # Trap vulnerabilities sitting in either top-level manifest declarations or transitive nodes
                if ($fw.topLevelPackages -and $fw.topLevelPackages.vulnerabilities) { $hasVuln = $true }
                if ($fw.transitivePackages -and $fw.transitivePackages.vulnerabilities) { $hasVuln = $true }
              }
            }
          }

          if ($hasVuln) {
            # Print human-readable output to logs for rapid local manual triage
            dotnet list Servy.sln package --vulnerable --include-transitive
            throw "Vulnerable NuGet packages detected in Servy.sln - see the package list above."
          }
          else {
            Write-Host "No vulnerable NuGet packages found in Servy.sln." -ForegroundColor Green
          }

  # 2. Static Analysis (SAST)
  # Uses GitHub CodeQL to find security vulnerabilities in the C# code
  static-analysis:
    timeout-minutes: 10
    name: Static Analysis (CodeQL)
    runs-on: windows-latest
    # Elevate permissions specifically for CodeQL to write security results
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 #v4.35.1
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check .NET version
        run: dotnet --version

      - name: Build for Analysis
        run: dotnet build Servy.sln --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 #v4.35.1
        with:
          category: "/language:csharp" # This helps the UI link the report to the summary

  # 3. Secret Scanning
  # Checks the commit history for leaked credentials, API keys, and tokens
  secret-scanning:
    timeout-minutes: 10
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0 # Full history is needed for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e #v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}