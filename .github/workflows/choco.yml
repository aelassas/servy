# ===========================================
# GitHub Actions Workflow - Choco
# -------------------------------------------
# Packages and publishes the Servy installer to
# Chocolatey when a new GitHub release is published
# or when manually triggered. It downloads the latest
# installer, computes the SHA256 checksum, updates
# nuspec and install scripts, commits the changes,
# and pushes the package to Chocolatey.
# ===========================================

name: choco

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1)'
        required: false

concurrency:
  group: choco-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  choco:
    runs-on: windows-latest
    permissions:
      contents: write # Needed here to push commits back
      
    env:
      MAX_RETRIES: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Set version vars
        uses: ./.github/actions/resolve-version
        with:
          manual_tag: ${{ github.event.inputs.tag }}
          release_tag: ${{ github.event.release.tag_name }}

      - name: Download installer
        shell: pwsh
        run: |
          $url = "https://github.com/aelassas/servy/releases/download/${env:TAG}/servy-${env:VERSION}-x64-installer.exe"
          $out = "servy-${env:VERSION}-x64-installer.exe"
          Write-Host "Downloading Servy installer from $url"
          
          # Defensive resilient download loop to protect against CDN propagation latency
          $retries = [int]$env:MAX_RETRIES
          for ($i = 0; $i -lt $retries; $i++) {
              try {
                  Invoke-WebRequest -Uri $url -OutFile $out -ErrorAction Stop
                  break
              }
              catch {
                  if ($i -eq ($retries - 1)) { throw "Failed to download installer after $retries attempts. Error: $_" }
                  Write-Host "Transient download failure. Retrying in 3 seconds... (Attempt $($i + 1)/$retries)"
                  Start-Sleep -Seconds 3
              }
          }

      - name: Compute SHA256
        shell: pwsh
        run: |
          $HASH = Get-FileHash "servy-${env:VERSION}-x64-installer.exe" -Algorithm SHA256
          $UPPER = $HASH.Hash.ToUpper()
          Add-Content -Path $env:GITHUB_ENV -Value "HASH=$UPPER"

      - name: Update nuspec version and release notes
        shell: pwsh
        run: |
          $file = "setup/choco/servy/servy.nuspec"
          $content = Get-Content $file -Raw

          $content = $content -replace '<version>.*?</version>', "<version>${env:VERSION}.0</version>"
          $content = $content -replace '(?s)<releaseNotes>.*?</releaseNotes>', "<releaseNotes>Release for version ${env:VERSION}.0. See https://github.com/aelassas/servy/releases/tag/${env:TAG}</releaseNotes>"
          $content = $content -replace '<iconUrl>.*?</iconUrl>', "<iconUrl>https://cdn.jsdelivr.net/gh/aelassas/servy@${env:TAG}/src/Servy/servy.ico</iconUrl>"

          # Write without adding extra newline
          [System.IO.File]::WriteAllText($file, $content)

      - name: Update chocolateyinstall.ps1
        shell: pwsh
        run: |
          $file = "setup/choco/servy/tools/chocolateyinstall.ps1"
          $content = Get-Content $file -Raw

          # Build replacement strings
          $urlReplacement = "`$url64         = 'https://github.com/aelassas/servy/releases/download/${env:TAG}/servy-${env:VERSION}-x64-installer.exe'"
          $checksumReplacement = "`$checksum64    = '${env:HASH}'"

          Write-Host "URL: $urlReplacement"
          Write-Host "HASH: $checksumReplacement"

          # Use [regex]::Replace to handle $ literally
          $content = [regex]::Replace($content, [regex]::Escape('$url64') + '\s*=.*', $urlReplacement)
          $content = [regex]::Replace($content, [regex]::Escape('$checksum64') + '\s*=.*', $checksumReplacement)

          # Write content back without extra newline
          [System.IO.File]::WriteAllText($file, $content)

      - name: Commit and Push (with Retry)
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add setup/choco/servy/*
           
          # Check if there is actually anything to commit
          if (-not (git status --porcelain)) {
              Write-Host "No changes to commit. Skipping push."
              exit 0
          }

          git commit -m "chore(choco): update package for version ${env:VERSION}"

          $maxRetries = 5
          $retryCount = 0
          $pushSuccess = $false

          while (-not $pushSuccess -and $retryCount -lt $maxRetries) {
              try {
                  # 1. Clean up any leftover state from a previous failed attempt
                  git rebase --abort 2>$null
                  git merge  --abort 2>$null

                  Write-Host "Attempting to push (Attempt $($retryCount + 1))..."
           
                  # 2. Pull latest changes
                  git git pull --rebase=merges --autostash origin main
                  if ($LASTEXITCODE -ne 0) { 
                      throw "git pull failed with exit code $LASTEXITCODE" 
                  }

                  # 3. Push to main
                  git push origin HEAD:main
                  if ($LASTEXITCODE -ne 0) { 
                      throw "git push failed with exit code $LASTEXITCODE" 
                  }

                  $pushSuccess = $true
                  Write-Host "Push successful!"
              }
              catch {
                  $retryCount++
                  # Access the thrown message via $_.Exception.Message
                  Write-Warning "Push failed: $($_.Exception.Message). Waiting 5 seconds before retry..."
                  Start-Sleep -s 5
              }
          }

          if (-not $pushSuccess) {
              throw "Failed to push Chocolatey updates to main after $maxRetries attempts."
          }

      - name: Check Chocolatey version
        shell: pwsh
        run: choco --version

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          choco pack setup/choco/servy/servy.nuspec --out setup/choco/servy
          if ($LASTEXITCODE -ne 0) {
              throw "choco pack failed with exit code $LASTEXITCODE"
          }

      - name: Push Chocolatey package
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $nupkg = "setup/choco/servy/servy.${env:VERSION}.0.nupkg"
          if (-not (Test-Path $nupkg)) {
              throw "Expected nupkg not found at '$nupkg' - choco pack likely did not produce it."
          }
          choco push $nupkg --source "https://community.chocolatey.org/api/v2/package" --api-key $env:CHOCOLATEY_API_KEY
          if ($LASTEXITCODE -ne 0) {
              throw "choco push failed with exit code $LASTEXITCODE"
          }