# ===============================================
# GitHub Actions Workflow - Wiki Maintenance
# -----------------------------------------------
# Enforces file naming standards in the GitHub Wiki.
# Specifically, it ensures no filenames contain
# non-ASCII characters, which could lead to
# cross-platform issues.
# ===============================================

name: wiki

on:
  gollum:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-filenames:
    name: Validate ASCII Filenames
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Wiki
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1
        with:
          repository: ${{ github.repository }}.wiki

      - name: Check for non-ASCII bytes in filenames
        run: |
          # 1. Safety check: Ensure workspace files are present (now at root)
          if [ -z "$(ls -A .)" ]; then
            echo "Error: Wiki repository appears empty or inaccessible."
            exit 1
          fi

          # 2. Collect any filenames containing non-ASCII bytes. `|| true` keeps the
          # pipeline from failing the step when grep finds no matches (exit 1).
          # We then fail the build only if the captured list is non-empty.
          NON_ASCII_FILES=$(find . -path ./.git -prune -o -type f -print | grep -P '[^\x00-\x7F]' || true)
          
          if [ -n "$NON_ASCII_FILES" ]; then
            echo "Error: The following wiki filenames contain non-ASCII characters:"
            echo "$NON_ASCII_FILES"
            echo "Please rename these files using only standard ASCII characters to ensure compatibility."
            exit 1
          else
            echo "All wiki filenames are ASCII compliant."
          fi