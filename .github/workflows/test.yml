# ===========================================
# GitHub Actions Workflow - Test (net48)
# -------------------------------------------
# Builds the Servy solution targeting .NET Framework 4.8,
# runs all tests, collects coverage for all components,
# normalizes paths, and uploads coverage to Codecov and Coveralls.
# ===========================================
name: test
on:
  push:
    branches:
      - net48
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  test:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important, otherwise commit message won't be available                    
          
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore Servy.sln

      - name: Build Solution (Debug)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m

      - name: Setup .NET SDK 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install Coverlet global tool
        run: dotnet tool install --global coverlet.console --version 3.2.0

      - name: Add dotnet tools to PATH
        run: echo "$env:PATH += ';$env:USERPROFILE\.dotnet\tools'"  
        shell: pwsh

      - name: Run all tests with coverage (Debug)
        shell: pwsh
        run: |
          $testProjects = @(
              @{ Name = "Servy.Core.UnitTests"; Dir = "Core"; Filter = $null }
              @{ Name = "Servy.Core.IntegrationTests"; Dir = "Core"; Filter = $null }
              @{ Name = "Servy.Infrastructure.UnitTests"; Dir = "Infrastructure"; Filter = $null }
              @{ Name = "Servy.Restarter.UnitTests"; Dir = "Restarter"; Filter = $null }
              @{ Name = "Servy.Service.UnitTests"; Dir = "Service"; Filter = "Category!=ReflectionValidation" }
              @{ Name = "Servy.Service.IntegrationTests"; Dir = "Service"; Filter = $null }
              @{ Name = "Servy.UI.UnitTests"; Dir = "UI"; Filter = $null }
              @{ Name = "Servy.UI.IntegrationTests"; Dir = "UI"; Filter = $null }
              @{ Name = "Servy.UnitTests"; Dir = "UnitTests"; Filter = $null }
              @{ Name = "Servy.Manager.UnitTests"; Dir = "Manager"; Filter = $null }
              @{ Name = "Servy.CLI.UnitTests"; Dir = "CLI"; Filter = $null }
          )

          $failed = $false

          foreach ($proj in $testProjects) {
              Write-Host "Running tests for $($proj.Name)..." -ForegroundColor Cyan
              
              $dllPath = "tests\$($proj.Name)\bin\x64\Debug\$($proj.Name).dll"
              if (-Not (Test-Path $dllPath)) {
                  Write-Error "Test DLL not found: $dllPath"
                  $failed = $true
                  continue
              }

              # Build target arguments for vstest.console.exe              
              $targetArgs = "`"$dllPath`""
              if ($proj.Filter) {
                  $targetArgs += " /TestCaseFilter:`"$($proj.Filter)`""
              }
              
              # FIX: Include the project name in the file so integration tests don't overwrite unit tests              
              $outPath = "$($proj.Dir)\$($proj.Name).coverage.cobertura.xml"
              
              # Use vswhere to find the latest installed vstest.console.exe dynamically
              $vsInstallPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath

              if (-not $vsInstallPath) {
                  throw "Visual Studio installation not found using vswhere."
              }

              $vsTest = Join-Path $vsInstallPath "Common7\IDE\Extensions\TestPlatform\vstest.console.exe"

              if (-not (Test-Path $vsTest)) {
                  throw "Could not locate vstest.console.exe at expected path: $vsTest"
              }

              Write-Host "Using vstest.console.exe at: $vsTest"

              # FIX: Exclude all Unit, Integration, and Testing assemblies from instrumentation              
              & coverlet.exe $dllPath `
                  --target "$vsTest" `
                  --targetargs $targetArgs `
                  --output $outPath `
                  --format "cobertura" `
                  --include-directory "$env:GITHUB_WORKSPACE" `
                  --exclude "[*.UnitTests]*" `
                  --exclude "[*.IntegrationTests]*" `
                  --exclude "[Servy.Testing]*"
                  
              if ($LASTEXITCODE -ne 0) { 
                  $failed = $true 
                  Write-Error "Tests failed for project: $($proj.Name)"
              }
          }

          if ($failed) { 
              Write-Error "One or more test projects failed. Review the logs above."
              exit 1 
          }

      - name: Build Solution (Release)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m

      - name: Run all tests (Release)
        shell: pwsh
        run: |
          # Common paths for vstest.console.exe
          $possiblePaths = @(
              'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe',
              'C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\IDE\Extensions\TestPlatform\vstest.console.exe',
              'C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\IDE\Extensions\TestPlatform\vstest.console.exe',
              'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\Extensions\TestPlatform\vstest.console.exe'
          )

          $vsTest = $possiblePaths | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $vsTest) {
              throw "Could not locate vstest.console.exe on the runner."
          }

          Write-Host "Using vstest.console.exe at: $vsTest" -ForegroundColor Cyan

          # Find all test assemblies dynamically for the Release build
          $testDlls = Get-ChildItem -Path "tests" -Recurse -Include "*UnitTests.dll", "*IntegrationTests.dll" | Where-Object { $_.FullName -match "\\bin\\[A-Za-z0-9_]+\\Release\\" }

          if (-not $testDlls) {
              throw "No test assemblies found for Release configuration!"
          }

          Write-Host "`nFound test assemblies:"
          $testDlls | ForEach-Object { Write-Host " - $($_.FullName)" }

          $failed = $false

          foreach ($dll in $testDlls) {
              Write-Host "`nRunning tests in $($dll.Name)..." -ForegroundColor Yellow
              
              $args = @($dll.FullName, "/Framework:.NETFramework,Version=v4.8", "/logger:trx")
              
              # Automatically apply the required exclusion filter to the Service.UnitTests assembly
              if ($dll.Name -eq "Servy.Service.UnitTests.dll") {
                  $args += '/TestCaseFilter:Category!=ReflectionValidation'
              }

              & $vsTest $args

              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Tests failed in $($dll.Name)"
                  $failed = $true
              }
          }

          if ($failed) {
              throw "One or more Release test projects failed. Review the logs above."
          }

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        if: always()
        shell: pwsh
        run: |
          # Find all newly generated cobertura files dynamically          
          # FIX: Updated the filter to match the new unique filenames          
          $reports = Get-ChildItem -Path . -Recurse -Filter "*coverage.cobertura.xml" | Where-Object { $_.FullName -notmatch "CoverageMerged" }
          if ($reports.Count -eq 0) { Write-Error "No coverage files found!"; exit 1 }
          
          $reportPaths = $reports.FullName -join ";"
          
          # FIX: Add wildcard assembly filters to physically strip test assemblies from the merged XML          
          reportgenerator `
              "-reports:$reportPaths" `
              "-targetdir:CoverageMerged" `
              "-reporttypes:Cobertura" `
              "-assemblyfilters:-*.UnitTests;-*.IntegrationTests;-Servy.Testing"

      - name: Normalize coverage paths (PowerShell)
        if: always()
        shell: pwsh
        run: |
          $fixedDir = "CoverageMerged\fixed"
          if (-Not (Test-Path $fixedDir)) { New-Item -ItemType Directory -Path $fixedDir | Out-Null }
        
          $mergedFile = "CoverageMerged\Cobertura.xml"
          if (-Not (Test-Path $mergedFile)) { Write-Error "$mergedFile not found"; exit 1 }

          $content = Get-Content $mergedFile -Raw
          $content = [regex]::Replace($content, 'filename="([^"]*)"', {
              param($match)
              $origPath = $match.Groups[1].Value -replace '\\', '/'
              
              # Dynamic match for ALL Servy projects              
              if ($origPath -match 'src/(Servy[^/]*)/(.*)') {
                  return "filename=`"src/$($matches[1])/$($matches[2])`""
              }
              else {
                  return "filename=`"$origPath`""
              }
          })
          
          $normalizedFile = Join-Path $fixedDir "coverage.cobertura.xml"
          $content | Set-Content $normalizedFile -Encoding utf8

      - name: Upload coverage to Codecov
        id: codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  
          files: CoverageMerged/fixed/coverage.cobertura.xml
          flags: unittests,integrationtests
          name: codecov-coverage-report
          fail_ci_if_error: false
          verbose: false
          commit_parent: ${{ github.event.before }}         

      - name: Notify Codecov Status in case of failure
        if: always() && steps.codecov.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'codecov-tracking',
              state: 'open'
            });
            
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Codecov upload failed in workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              });
            }

      - name: Upload coverage to Coveralls
        id: coveralls
        uses: coverallsapp/github-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-path: ${{ github.workspace }}
          file: CoverageMerged/fixed/coverage.cobertura.xml
          format: cobertura
          fail-on-error: false
          debug: false
        env:
            COVERALLS_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Notify Coveralls Status in case of failure
        if: always() && steps.coveralls.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'coveralls-tracking',
              state: 'open'
            });
            
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Coveralls upload failed in workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              });
            }