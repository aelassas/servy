# ===========================================
# GitHub Actions Workflow - Test
# -------------------------------------------
# Runs tests for all Servy projects on push
# to the main branch. Generates code coverage for
# core components, merges Cobertura reports, and
# uploads results to Codecov and Coveralls.
# ===========================================
name: test
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important, otherwise commit message won't be available          
          
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore Servy.sln

      - name: Build solution (Debug)
        run: dotnet build Servy.sln --configuration Debug --no-restore

      - name: Run all tests with coverage (Debug)
        shell: pwsh
        run: |
          $testProjects = @(
              @{ Path = "tests/Servy.Core.UnitTests/Servy.Core.UnitTests.csproj"; Dir = "Core"; Filter = $null }
              @{ Path = "tests/Servy.Core.IntegrationTests/Servy.Core.IntegrationTests.csproj"; Dir = "Core"; Filter = $null }
              @{ Path = "tests/Servy.Infrastructure.UnitTests/Servy.Infrastructure.UnitTests.csproj"; Dir = "Infrastructure"; Filter = $null }
              @{ Path = "tests/Servy.Restarter.UnitTests/Servy.Restarter.UnitTests.csproj"; Dir = "Restarter"; Filter = $null }
              @{ Path = "tests/Servy.Service.UnitTests/Servy.Service.UnitTests.csproj"; Dir = "Service"; Filter = "Category!=ReflectionValidation" }
              @{ Path = "tests/Servy.Service.IntegrationTests/Servy.Service.IntegrationTests.csproj"; Dir = "Service"; Filter = $null }
              @{ Path = "tests/Servy.UI.UnitTests/Servy.UI.UnitTests.csproj"; Dir = "UI"; Filter = $null }
              @{ Path = "tests/Servy.UI.IntegrationTests/Servy.UI.IntegrationTests.csproj"; Dir = "UI"; Filter = $null }
              @{ Path = "tests/Servy.UnitTests/Servy.UnitTests.csproj"; Dir = "UnitTests"; Filter = $null }
              @{ Path = "tests/Servy.Manager.UnitTests/Servy.Manager.UnitTests.csproj"; Dir = "Manager"; Filter = $null }
              @{ Path = "tests/Servy.CLI.UnitTests/Servy.CLI.UnitTests.csproj"; Dir = "CLI"; Filter = $null }
          )

          $failed = $false

          foreach ($proj in $testProjects) {
              # Extract the project name to ensure unique output folders              
              $projName = [System.IO.Path]::GetFileNameWithoutExtension($proj.Path)
              Write-Host "Running tests for $projName..." -ForegroundColor Cyan
              
              # Construct the base command              
              # FIX: Added $projName to the results-directory to completely prevent coverage overwriting collisions              
              $cmd = "dotnet test $($proj.Path) --configuration Debug --no-build --collect `"XPlat Code Coverage`" --results-directory `"./TestResults/$($proj.Dir)/$projName`""
              
              # Add filter if present                            
              if ($proj.Filter) { $cmd += " --filter `"$($proj.Filter)`"" }
              
              # Add Coverage Formats and the Exclude filter for Servy.Testing              
              # FIX: Added wildcards to exclude all Unit and Integration tests from being instrumented              
              $cmd += " -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=`"[*.UnitTests]*,[*.IntegrationTests]*,[Servy.Testing]*`""

              # Execute the string as a command                            
              Invoke-Expression $cmd
              
              if ($LASTEXITCODE -ne 0) { 
                  $failed = $true 
                  Write-Error "Tests failed for project: $projName"
              }
          }

          if ($failed) { 
              Write-Error "One or more test projects failed. Review the logs above."
              exit 1 
          }

      - name: Build solution (Release)
        run: dotnet build Servy.sln --configuration Release --no-restore

      - name: Run all tests (Release)
        run: dotnet test Servy.sln --configuration Release --no-build --filter "Category!=ReflectionValidation"

      - name: Merge and normalize coverage paths (PowerShell)
        shell: pwsh
        # We use always() here so coverage is merged and uploaded even if a test failed above.                
        if: always() 
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $fixedDir = Join-Path $workspace "TestResults\fixed"
          if (-Not (Test-Path $fixedDir)) { New-Item -ItemType Directory -Path $fixedDir | Out-Null }

          $coverageFiles = Get-ChildItem -Path TestResults -Recurse -Filter "coverage.cobertura.xml"
          if ($coverageFiles.Count -eq 0) { Write-Error "No coverage files found"; exit 1 }

          # Path to local .NET SDK                    
          $dotnet = "$env:RUNNER_TEMP\dotnet\dotnet.exe"

          # Create a temp folder for local tools                    
          $localTools = "$env:RUNNER_TEMP\localtools"
          if (-Not (Test-Path $localTools)) { New-Item -ItemType Directory -Path $localTools | Out-Null }

          # Initialize a temporary local tool manifest                    
          & $dotnet new tool-manifest --force --output $localTools

          # Install reportgenerator as a local tool                    
          Push-Location $localTools
          & $dotnet tool install dotnet-reportgenerator-globaltool --version 5.*

          # Run reportgenerator via dotnet CLI from local manifest          
          # FIX: Wrapped arguments containing semicolons (;) in double-quotes so PowerShell parses them correctly          
          $joinedReports = $coverageFiles.FullName -join ';'
          & $dotnet tool run reportgenerator `
              "-reports:$joinedReports" `
              "-targetdir:$fixedDir" `
              "-reporttypes:Cobertura" `
              "-assemblyfilters:-*.UnitTests;-*.IntegrationTests;-Servy.Testing"
          Pop-Location

          # Normalize filename paths dynamically for ALL Servy projects                    
          $mergedFile = Join-Path $fixedDir "Cobertura.xml"
          $content = Get-Content $mergedFile -Raw
          $content = [regex]::Replace($content, 'filename="([^"]*)"', {
              param($match)
              $origPath = $match.Groups[1].Value -replace '\\', '/'
              
              # This regex dynamically matches any project folder starting with 'Servy'                            
              if ($origPath -match 'src/(Servy[^/]*)/(.*)') {
                  return "filename=`"src/$($matches[1])/$($matches[2])`""
              }
              else {
                  return "filename=`"$origPath`""
              }
          })
          
          $normalizedFile = Join-Path $fixedDir "coverage.cobertura.xml"
          $content | Out-File -FilePath $normalizedFile -Encoding utf8

          if (-Not (Test-Path $normalizedFile)) { Write-Error "$normalizedFile not found"; exit 1 }

          Get-ChildItem -Path TestResults -Recurse -Filter "coverage.cobertura.xml" | Where-Object { $_.FullName -ne $normalizedFile } | Remove-Item

      - name: Upload coverage to Codecov
        id: codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}          
          files: TestResults/fixed/coverage.cobertura.xml
          flags: unittests,integrationtests
          name: codecov-coverage-report
          fail_ci_if_error: false
          verbose: false
          commit_parent: ${{ github.event.before }}         
          
      - name: Notify Codecov Status in case of failure
        if: always() && steps.codecov.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'codecov-tracking',
              state: 'open'
            });
            
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Codecov upload failed in workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              });
            }

      - name: Upload coverage to Coveralls
        id: coveralls
        uses: coverallsapp/github-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-path: ${{ github.workspace }}
          file: TestResults/fixed/coverage.cobertura.xml
          format: cobertura
          fail-on-error: false
          debug: false
        env:
          COVERALLS_GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Notify Coveralls Status in case of failure
        if: always() && steps.coveralls.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'coveralls-tracking',
              state: 'open'
            });
            
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Coveralls upload failed in workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              });
            }