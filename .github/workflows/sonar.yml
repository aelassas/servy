# --------------------------------------------------------------------------
# SonarCloud Analysis Workflow for Servy (.NET Framework 4.8 build)
# Description: Performs static code analysis and security scanning using MSBuild.
# Author: Akram El Assas
# --------------------------------------------------------------------------

name: sonar
on:
  push:
    branches:
      - net48
  # pull_request:
  #   types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    
    env:
      SONAR_SCANNER_VERSION: "11.2.1"    

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0 
          
      # 2. Setup Java (Required by SonarCloud)
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 #v5.6.0
        with:
          java-version: 17
          distribution: 'zulu'

      # 3. Setup .NET (Satisfies global.json and provides environment for scanner)
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      # 4. Add MSBuild and NuGet to the PATH
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce #v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f #v2.0.2

      # 5. Cache Packages
      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar-v1
          restore-keys: ${{ runner.os }}-sonar-

      # 6. Cache Scanner
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner-${{ env.SONAR_SCANNER_VERSION }}
          restore-keys: ${{ runner.os }}-sonar-scanner-

      # 7. Install / Update Scanner
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (!(Test-Path ${{ runner.temp }}\scanner)) { New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory }
          # Utilizing 'update' ensures version switches don't crash when versionless fallbacks populate the tool-path
          dotnet tool update dotnet-sonarscanner --version $env:SONAR_SCANNER_VERSION --tool-path ${{ runner.temp }}\scanner

      # 8. Restore NuGet Packages (Mandatory for MSBuild)
      - name: Restore NuGet packages
        run: nuget restore

      # 9. Build and Analyze
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"aelassas_servy" `
            /o:"aelassas" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io"
          
          if ($LASTEXITCODE -ne 0) { throw "sonarscanner begin failed (exit $LASTEXITCODE)" }

          # Using MSBuild for .NET 4.8
          msbuild /p:Configuration=Release /p:Platform=x64
          $buildExit = $LASTEXITCODE
          
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
          $endExit = $LASTEXITCODE

          if ($buildExit -ne 0) { throw "msbuild failed (exit $buildExit)" }
          if ($endExit  -ne 0) { throw "sonarscanner end failed (exit $endExit)" }
