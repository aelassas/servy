# --------------------------------------------------------------------------
# SonarCloud Analysis Workflow for Servy (.NET Framework 4.8 build)
# Description: Performs static code analysis and security scanning using MSBuild.
# Author: Akram El Assas
# --------------------------------------------------------------------------

name: sonar
on:
  push:
    branches:
      - net48
  # pull_request:
  #   types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      # 2. Setup Java (Required by SonarCloud)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # 3. Setup .NET (Satisfies global.json and provides environment for scanner)
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      # 4. Add MSBuild and NuGet to the PATH
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      # 5. Cache Packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 6. Cache Scanner
      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      # 7. Install Scanner (The dotnet-tool wrapper still works great for MSBuild analysis)
      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (!(Test-Path ${{ runner.temp }}\scanner)) { New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory }
          dotnet tool install dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      # 8. Restore NuGet Packages (Mandatory for MSBuild)
      - name: Restore NuGet packages
        run: nuget restore

      # 9. Build and Analyze
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"aelassas_servy" /o:"aelassas" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
          
          # Using MSBuild for .NET 4.8
          msbuild /p:Configuration=Release
          
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"