# ==========================================================
# GitHub Actions Workflow - Test (ARM64 Native)
# ----------------------------------------------------------
# Runs tests for all Servy projects natively on Windows ARM64.
# Generates code coverage for core components, merges Cobertura 
# reports, and uploads results to Codecov and Coveralls.
# ==========================================================
name: test-arm64

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Test on Windows ARM64
    # Targeted flag for native ARM64 Windows host execution
    runs-on: windows-11-arm

    env:
      REPORTGENERATOR_VERSION: "5.5.10"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1
        with:
          fetch-depth: 0   # important, otherwise commit message won't be available          
          
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Check .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore Servy.sln

      - name: Build solution (Debug)
        run: dotnet build Servy.sln --configuration Debug --no-restore

      - name: Run all tests with coverage (Debug)
        shell: pwsh
        run: |
          $testProjects = @(
              @{ Path = "tests/Servy.Core.UnitTests/Servy.Core.UnitTests.csproj"; Dir = "Core"; Filter = $null }
              @{ Path = "tests/Servy.Core.IntegrationTests/Servy.Core.IntegrationTests.csproj"; Dir = "Core"; Filter = $null }
              @{ Path = "tests/Servy.Infrastructure.UnitTests/Servy.Infrastructure.UnitTests.csproj"; Dir = "Infrastructure"; Filter = $null }
              @{ Path = "tests/Servy.Infrastructure.IntegrationTests/Servy.Infrastructure.IntegrationTests.csproj"; Dir = "Infrastructure"; Filter = $null }
              @{ Path = "tests/Servy.Restarter.UnitTests/Servy.Restarter.UnitTests.csproj"; Dir = "Restarter"; Filter = $null }
              @{ Path = "tests/Servy.Service.UnitTests/Servy.Service.UnitTests.csproj"; Dir = "Service"; Filter = "Category!=ReflectionValidation" }
              @{ Path = "tests/Servy.Service.IntegrationTests/Servy.Service.IntegrationTests.csproj"; Dir = "Service"; Filter = $null }
              @{ Path = "tests/Servy.UI.UnitTests/Servy.UI.UnitTests.csproj"; Dir = "UI"; Filter = $null }
              @{ Path = "tests/Servy.UI.IntegrationTests/Servy.UI.IntegrationTests.csproj"; Dir = "UI"; Filter = $null }
              @{ Path = "tests/Servy.UnitTests/Servy.UnitTests.csproj"; Dir = "UnitTests"; Filter = $null }
              @{ Path = "tests/Servy.Manager.UnitTests/Servy.Manager.UnitTests.csproj"; Dir = "Manager"; Filter = $null }
              @{ Path = "tests/Servy.CLI.UnitTests/Servy.CLI.UnitTests.csproj"; Dir = "CLI"; Filter = $null }
          )

          $failed = $false

          foreach ($proj in $testProjects) {
              # Extract the project name to ensure unique output folders              
              $projName = [System.IO.Path]::GetFileNameWithoutExtension($proj.Path)
              Write-Host "Running tests for $projName..." -ForegroundColor Cyan
              
              # Construct the arguments array              
              # FIX: Added $projName to the results-directory to completely prevent coverage overwriting collisions              
              $dotnetArgs = @(
                  'test', $proj.Path,
                  '--configuration', 'Debug',
                  '--no-build',
                  '--collect', 'XPlat Code Coverage',
                  '--results-directory', "./TestResults/$($proj.Dir)/$projName"
              )
              
              # Add filter if present                            
              if ($proj.Filter) { $dotnetArgs += @('--filter', $proj.Filter) }
              
              # Add Coverage Formats and the Exclude filter for Servy.Testing   
              # FIX: Added wildcards to exclude all Unit and Integration tests from being instrumented              
              # UPDATED: Added **/*.xaml and **/*.xaml.cs to the Exclude configuration
              $dotnetArgs += @(
                  '--',
                  'DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura',
                  'DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*.UnitTests]*,[*.IntegrationTests]*,[Servy.Testing]*,**/*.xaml,**/*.xaml.cs,**/*.g.cs,**/obj/**/*'
              )

              # Execute the command securely using splatting                            
              & dotnet @dotnetArgs
              
              if ($LASTEXITCODE -ne 0) { 
                  $failed = $true 
                  Write-Error "Tests failed for project: $projName"
              }
          }

          if ($failed) { 
              Write-Error "One or more test projects failed. Review the logs above."
              exit 1 
          }

      - name: Build solution (Release)
        run: dotnet build Servy.sln --configuration Release --no-restore

      - name: Run all tests (Release)
        run: dotnet test Servy.sln --configuration Release --no-build --filter "Category!=ReflectionValidation"
