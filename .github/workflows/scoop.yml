# ===========================================
# GitHub Actions Workflow - Scoop
# -------------------------------------------
# Automates the update of Servy’s Scoop manifest.
# When a new release is published (or triggered
# manually), this workflow:
#      • Downloads the latest installer
#      • Computes its SHA256 hash
#      • Updates the manifest in `aelassas/scoop-bucket`
#      • Optionally creates a PR to update the manifest
#        in `ScoopInstaller/Extras`
# ===========================================

name: scoop

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1)'
        required: false
      run_extras_pr:
        description: 'Also update ScoopInstaller/Extras?'
        required: false
        default: 'false'

concurrency:
  group: scoop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scoop:
    runs-on: windows-latest
    permissions:
      contents: write # Needed here to push commits back
      
    env:
        RUN_EXTRAS_PR: ${{ github.event.inputs.run_extras_pr || 'false' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Set version vars
        uses: ./.github/actions/resolve-version
        with:
          manual_tag: ${{ github.event.inputs.tag }}
          release_tag: ${{ github.event.release.tag_name }}

      - name: Download installer
        shell: pwsh
        run: |
          $InstallerDir = "$env:GITHUB_WORKSPACE\_installer"
          New-Item -ItemType Directory -Force -Path $InstallerDir
          $url = "https://github.com/aelassas/servy/releases/download/${env:TAG}/servy-${env:VERSION}-x64-installer.exe"
          Write-Host "Downloading Servy installer from $url"
          Invoke-WebRequest -Uri $url -OutFile "$InstallerDir\servy-${env:VERSION}-x64-installer.exe"

      - name: Compute SHA256
        shell: pwsh
        run: |
          $InstallerDir = "$env:GITHUB_WORKSPACE\_installer"
          $InstallerPath = "$InstallerDir\servy-${env:VERSION}-x64-installer.exe"
          $HASH = Get-FileHash $InstallerPath -Algorithm SHA256
          $LOWER = $HASH.Hash.ToLower()
          "HASH=$LOWER" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item $InstallerPath

      - name: Create PowerShell utility
        shell: pwsh
        run: |
          $script = @'
          function Write-ScoopManifest {
              param($jsonObj, $jsonPath)
              if ($null -eq $jsonObj) { throw "jsonObj cannot be null" }
               
              $jsonString = $jsonObj | ConvertTo-Json -Depth 10 -Compress:$false
               
              # Split lines correctly using regex
              $lines = [regex]::Split($jsonString, "\r?\n")
               
              # Normalize indentation explicitly: calculate the nesting level based on 
              # Windows PowerShell 5.1's 2-space baseline and map it securely to a 4-space indent.
              $lines = $lines | ForEach-Object {
                  [regex]::Replace($_, '^( +)', {
                      param($m)
                      $level = [int]($m.Value.Length / 2)
                      ' ' * (4 * $level)
                  })
              }
               
              # Join lines back together with a standardized Unix trailing newline
              $jsonString = ($lines -join "`n").TrimEnd("`r", "`n") + "`n"
               
              # Write to file using UTF8
              [System.IO.File]::WriteAllText($jsonPath, $jsonString, [System.Text.Encoding]::UTF8)
              Write-Host "Successfully wrote manifest to $jsonPath"
          }
          '@
          # Write to temp directory to ensure accessibility across subfolders
          $script | Out-File -FilePath "$env:TEMP\ScoopUtils.ps1" -Encoding utf8

      - name: Update servy.json in current repository
        shell: pwsh
        run: |
          . "$env:TEMP\ScoopUtils.ps1"
          $manifestPath = "setup/scoop/servy.json"
          if (-Not (Test-Path $manifestPath)) {
              Write-Error "Manifest not found at $manifestPath"
              exit 1
          }

          # Load and update JSON
          $jsonObj = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $jsonObj.version = $env:VERSION
          $jsonObj.architecture.'64bit'.url = "https://github.com/aelassas/servy/releases/download/v$($env:VERSION)/servy-$($env:VERSION)-x64-installer.exe"
          $jsonObj.architecture.'64bit'.hash = $env:HASH

          Write-ScoopManifest -jsonObj $jsonObj -jsonPath (Resolve-Path $manifestPath)

          # Commit and push back to aelassas/servy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if (git status --porcelain) {
            git add $manifestPath
            git commit -m "chore: update setup/scoop/servy.json to version $env:VERSION"
             
            # Explicitly target the main branch
            git pull origin main
            if ($LASTEXITCODE -ne 0) { throw "git pull failed (exit $LASTEXITCODE)" }
            git push origin HEAD:main
            if ($LASTEXITCODE -ne 0) { throw "git push failed (exit $LASTEXITCODE)" }
          } else {
            Write-Host "No changes to local manifest."
          }

      - name: Update servy.json in scoop-bucket and push
        shell: pwsh
        env:
          HASH: ${{ env.HASH }}
          VERSION: ${{ env.VERSION }}
          GH_PAT: ${{ secrets.PAT }}
        run: |
          . "$env:TEMP\ScoopUtils.ps1"
          git clone https://github.com/aelassas/scoop-bucket.git scoop-bucket
          Set-Location scoop-bucket
           
          git config url."https://x-access-token:${env:GH_PAT}@github.com/".insteadOf "https://github.com/"
           
          $manifestPath = "servy.json"
          $jsonObj = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $jsonObj.version = $env:VERSION
          $jsonObj.architecture.'64bit'.url = "https://github.com/aelassas/servy/releases/download/v$($env:VERSION)/servy-$($env:VERSION)-x64-installer.exe"
          $jsonObj.architecture.'64bit'.hash = $env:HASH
           
          Write-ScoopManifest -jsonObj $jsonObj -jsonPath (Join-Path (Get-Location) $manifestPath)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if (git status --porcelain) {
            git add $manifestPath
            git commit -m "chore: update Servy Scoop manifest to version $env:VERSION"
            git pull
            if ($LASTEXITCODE -ne 0) { throw "git pull failed (exit $LASTEXITCODE)" }
            git push origin HEAD
            if ($LASTEXITCODE -ne 0) { throw "git push failed (exit $LASTEXITCODE)" }
          } else {
            Write-Host "No changes to commit"
          }

      - name: Update servy.json in aelassas/Extras and prepare PR branch
        if: env.RUN_EXTRAS_PR == 'true'
        shell: pwsh
        env:
          GH_PAT: ${{ secrets.PAT }}    # Used for Git URL injection
          GH_TOKEN: ${{ secrets.PAT }}  # Used for GH CLI authentication
        run: |
          . "$env:TEMP\ScoopUtils.ps1"
          git clone https://github.com/aelassas/Extras.git extras
          Set-Location extras

          git config url."https://x-access-token:${env:GH_PAT}@github.com/".insteadOf "https://github.com/"
          $branchName = "update-servy-$env:VERSION"

          $mergedPR = gh pr list --repo ScoopInstaller/Extras --head "aelassas:$branchName" --state merged --json number --limit 1 | ConvertFrom-Json
          if ($mergedPR.Count -gt 0) {
              Write-Host "A PR for version $env:VERSION has already been merged. Skipping."
              return 
          }

          git remote add upstream https://github.com/ScoopInstaller/Extras.git
          git fetch upstream master
          git checkout -B master upstream/master
           
          if (git rev-parse --verify --quiet "refs/heads/$branchName" 2>$null) {
              git branch -D $branchName
          }
          git checkout -b $branchName
           
          $manifestPath = "bucket/servy.json"
          $fullPath = Join-Path (Get-Location) $manifestPath
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if (-Not (Test-Path $manifestPath)) {
              # Source canonical metadata fields directly from the updated reference file in the workspace
              $canonicalSourcePath = "$env:GITHUB_WORKSPACE/setup/scoop/servy.json"
              $canonicalObj = Get-Content $canonicalSourcePath -Raw | ConvertFrom-Json
              $installerUrl = "https://github.com/aelassas/servy/releases/download/v$($env:VERSION)/servy-$($env:VERSION)-x64-installer.exe"

              # Hydrate static structural fields directly from canonical settings
              $jsonObj = [PSCustomObject]@{
                  version      = $env:VERSION
                  description  = $canonicalObj.description
                  homepage     = $canonicalObj.homepage
                  license      = $canonicalObj.license
                  architecture = @{
                      '64bit' = @{
                          url  = $installerUrl
                          hash = $env:HASH
                      }
                  }
                  innosetup  = $canonicalObj.innosetup
                  bin        = $canonicalObj.bin
                  shortcuts  = $canonicalObj.shortcuts
                  checkver   = $canonicalObj.checkver
                  autoupdate = $canonicalObj.autoupdate
              }
              Write-ScoopManifest -jsonObj $jsonObj -jsonPath $fullPath
              git add $manifestPath
              git commit -m "servy: Update to version $env:VERSION"
          } else {
              # Update existing manifest
              $jsonObj = Get-Content $manifestPath -Raw | ConvertFrom-Json
              $jsonObj.version = $env:VERSION
              $jsonObj.architecture.'64bit'.url = $installerUrl
              $jsonObj.architecture.'64bit'.hash = $env:HASH

              Write-ScoopManifest -jsonObj $jsonObj -jsonPath $fullPath
           
              if (git status --porcelain) {
                  git add $manifestPath
                  git commit -m "servy: Update to version $env:VERSION"
              }
          }
          git push origin $branchName --force-with-lease
          if ($LASTEXITCODE -ne 0) { throw "git push failed (exit $LASTEXITCODE)" }
         
      - name: Open Pull Request in ScoopInstaller/Extras
        if: env.RUN_EXTRAS_PR == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          Set-Location extras
          $branchExists = git ls-remote --heads origin "update-servy-$env:VERSION"
          if ($branchExists) {
              gh pr create `
                --title "servy: Update to version $env:VERSION" `
                --body "Update Servy to version $env:VERSION." `
                --base master `
                --head "aelassas:update-servy-$env:VERSION" `
                --repo ScoopInstaller/Extras `
                --fill
          }