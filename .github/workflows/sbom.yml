# ==============================================================================
# SBOM Generation Workflow
# ==============================================================================
#
# Purpose:
#   This workflow generates a CycloneDX Software Bill of Materials (SBOM)
#   for the Servy solution and uploads it as a short-lived build artifact.
#
# Trigger:
#   Manually triggered via workflow_dispatch.
#
# Inputs:
#   version:
#     Required. Must be in Major.Minor format (e.g. 4.2).
#     The value is validated at runtime and used consistently for:
#       - SBOM metadata version
#       - Output filename
#       - Artifact name
#
# Security / Trust Notes:
#   - Version input is validated early and the workflow fails fast on error.
#   - Repository checkout uses full history to support provenance generation.
#   - The SBOM artifact is retained for 1 day to reduce exposure surface.
#
# Output:
#   - servy-<version>-net48-sbom.xml (CycloneDX XML)
#
# ==============================================================================

name: sbom

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in Major.Minor format (e.g. 4.2)'
        required: true

# Lockdown the token to read-only
permissions:
  contents: read

jobs:
  sbom:
    runs-on: windows-latest
    env:
      # Mapping to an environment variable prevents Expression Injection attacks
      INPUT_VERSION: ${{ github.event.inputs.version }}

    steps:
      # -----------------------------------------------------
      # Validate version input (Major.Minor)
      # -----------------------------------------------------
      - name: Validate version format
        shell: pwsh
        run: |
          $version = $env:INPUT_VERSION

          if ($version -notmatch '^\d+\.\d+$') {
            throw "Invalid version format '$version'. Expected Major.Minor (e.g. 4.2)."
          }

          Write-Host "Version format validated: $version"
          
      # -----------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0  # Required for provenance

      # -----------------------------------------------------
      # Build and Publish SBOM
      # -----------------------------------------------------
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install CycloneDX Tools
        uses: ./.github/actions/setup-cyclonedx

      - name: Generate SBOM
        shell: pwsh
        run: |
          $outputFile = "servy-$($env:INPUT_VERSION)-net48-sbom.xml"
          & setup/generate-sbom.ps1 -BaseVersion $env:INPUT_VERSION -OutputFile $outputFile

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4.6.2
        with:
          name: servy-${{ env.INPUT_VERSION }}-net48-sbom
          path: servy-${{ env.INPUT_VERSION }}-net48-sbom.xml
          if-no-files-found: error
          retention-days: 1