# ==============================================================================
# SBOM Generation Workflow
# ==============================================================================
#
# Purpose:
#   This workflow generates a CycloneDX Software Bill of Materials (SBOM)
#   for the Servy solution and uploads it as a short-lived build artifact.
#
# Trigger:
#   Manually triggered via workflow_dispatch.
#
# Inputs:
#   version:
#     Required. Must be in Major.Minor format (e.g. 4.2).
#     The value is validated at runtime and used consistently for:
#       - SBOM metadata version
#       - Output filename
#       - Artifact name
#
# Security / Trust Notes:
#   - Version input is validated early and the workflow fails fast on error.
#   - Repository checkout uses full history to support provenance generation.
#   - The SBOM artifact is retained for 1 day to reduce exposure surface.
#
# Output:
#   - servy-<version>-sbom.xml (CycloneDX XML)
#
# ==============================================================================

name: sbom

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in Major.Minor format (e.g. 4.2)'
        required: true

# Lockdown the token to read-only
permissions:
  contents: read

jobs:
  sbom:
    runs-on: windows-latest
    env:
      # Mapping the input to an environment variable prevents Expression Injection.
      # The shell will now treat this as a literal string.
      INPUT_VERSION: ${{ github.event.inputs.version }}
      CYCLONEDX_VERSION: "6.2.0"
      CYCLONEDX_CLI_VERSION: "v0.31.0"
      CYCLONEDX_CLI_HASH: "da18bdb0d5b10a5f45ddfb59b7b08b11ddc050bb5c6407608d831929a1799d3f"

    steps:
      # -----------------------------------------------------
      # Validate version input (Major.Minor)
      # -----------------------------------------------------
      - name: Validate version format
        shell: pwsh
        run: |
          $version = $env:INPUT_VERSION

          if ($version -notmatch '^\d+\.\d+$') {
            Write-Error "Invalid version format '$version'. Expected Major.Minor (e.g. 4.2)."
            exit 1
          }

          Write-Host "Version format validated: $version"
          
      # -----------------------------------------------------
      # Checkout repository
      # -----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------
      # Build and Publish SBOM
      # -----------------------------------------------------
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install CycloneDX Tools
        shell: pwsh
        run: |
          $v = $env:CYCLONEDX_CLI_VERSION
          if (-not $v) { 
              throw "CYCLONEDX_CLI_VERSION environment variable not set" 
          }
          
          # Force a hard stop if the download fails (e.g., GitHub is down or version is wrong)
          $uri = "https://github.com/CycloneDX/cyclonedx-cli/releases/download/$v/cyclonedx-win-x64.exe"
          Write-Host "Downloading CycloneDX CLI from $uri"
          $outPath = "$env:USERPROFILE\cyclonedx.exe"
          Invoke-WebRequest -Uri $uri -OutFile $outPath -ErrorAction Stop
          
          # --- SECURITY CHECK: SHA256 PINNING ---
          Write-Host "Verifying SHA256 checksum of CycloneDX CLI..."
          $actualHash = (Get-FileHash $outPath -Algorithm SHA256).Hash
          
          # -ne in PowerShell is inherently case-insensitive
          if ($actualHash -ne $env:CYCLONEDX_CLI_HASH) {
              throw "Security Breach: CycloneDX CLI hash mismatch! Expected: $($env:CYCLONEDX_CLI_HASH), Got: $actualHash"
          }
          Write-Host "Checksum verified successfully."
          # --------------------------------------

          Add-Content -Path $env:GITHUB_PATH -Value $env:USERPROFILE

          # Continue with the .NET tool installation
          dotnet tool install --global CycloneDX --version $env:CYCLONEDX_VERSION
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.dotnet\tools"

      - name: Generate SBOM
        shell: pwsh
        run: |
          # Use subexpression operator $() to safely append the .0 suffix
          $version = "$($env:INPUT_VERSION).0"
          
          dotnet-CycloneDX "src\Servy\Servy.csproj" --recursive --set-version "$version" --output . --filename "sbom-Servy.xml"
          dotnet-CycloneDX "src\Servy.CLI\Servy.CLI.csproj" --recursive --set-version "$version" --output . --filename "sbom-Servy.CLI.xml"
          dotnet-CycloneDX "src\Servy.Manager\Servy.Manager.csproj" --recursive --set-version "$version" --output . --filename "sbom-Servy.Manager.xml"
          dotnet-CycloneDX "src\Servy.Restarter\Servy.Restarter.csproj" --recursive --set-version "$version" --output . --filename "sbom-Servy.Restarter.xml"
          dotnet-CycloneDX "src\Servy.Service\Servy.Service.csproj" --recursive --set-version "$version" --output . --filename "sbom-Servy.Service.xml"
          
          $outputFile = "servy-$($env:INPUT_VERSION)-sbom.xml"
          
          cyclonedx merge --input-files `
            sbom-Servy.xml `
            sbom-Servy.CLI.xml `
            sbom-Servy.Manager.xml `
            sbom-Servy.Restarter.xml `
            sbom-Servy.Service.xml `
            --output-file "$outputFile"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          # Note: Using ${{ env.INPUT_VERSION }} here is also safer/consistent
          name: sbom-${{ env.INPUT_VERSION }}-sbom
          path: servy-${{ env.INPUT_VERSION }}-sbom.xml
          if-no-files-found: error
          retention-days: 1