# ===========================================
# GitHub Actions Workflow - WinGet
# -------------------------------------------
# Publishes the latest Servy release to WinGet
# when a new release is published.
# ===========================================

name: winget

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1)'
        required: false

concurrency:
  group: winget-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Publish Servy to WinGet
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e #v2
        with:
          identifier: aelassas.Servy
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: "servy-\\d+\\.\\d+-x64-installer\\.exe$"
          # Dynamically resolve tag parameters across automated hooks and manual re-run triggers
          release-tag: ${{ github.event.inputs.tag || github.event.release.tag_name }}