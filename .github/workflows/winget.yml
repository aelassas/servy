# ===========================================
# GitHub Actions Workflow — WinGet
# -------------------------------------------
# Publishes the latest Servy release to WinGet
# when a new release is published.
# ===========================================

name: winget

on:
  release:
    types: [published]

concurrency:
  group: winget-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Publish Servy to WinGet
        uses: vedantmgoyal9/winget-releaser@7bd472be23763def6e16bd06cc8b1cdfab0e2fd5
        with:
          identifier: aelassas.Servy
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: "servy-\\d+\\.\\d+(-net([0-9]+)(\\.[0-9]+)+)?-x64-installer\\.exe$"
