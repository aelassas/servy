# This workflow is disabled because reflection-based SCM registration has been replaced by native P/Invoke calls.
# This workflow is kept for emergency reflection-regression diagnosis.

name: dotnet-reflection

on: 
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce #v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f #v2.0.2

      - name: Restore NuGet Packages
        run: nuget restore Servy.sln

      - name: Build Solution (Debug)
        run: |
          msbuild Servy.sln `
            /p:Configuration=Debug `
            /p:Platform=x64 `
            /p:AllowUnsafeBlocks=true `
            /nodeReuse:false `
            /m

      - name: Verify Reflection Compatibility (xUnit)
        shell: pwsh
        run: |
          $testDll = "tests/Servy.Service.UnitTests/bin/x64/Debug/Servy.Service.UnitTests.dll"
          
          if (-not (Test-Path $testDll)) {
              Write-Error "Test DLL not found at $testDll. Please verify the bin structure."
              exit 1
          }

          dotnet test $testDll `
            --configuration Debug `
            --filter "Category=ReflectionValidation" `
            --logger "console;verbosity=detailed"