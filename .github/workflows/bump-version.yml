# ===========================================
# GitHub Actions Workflow - Bump Version
# -------------------------------------------
# Automatically bumps the Servy version number
# after a completed "choco" workflow.
# It determines the next semantic version, updates
# version files on both main and net48 branches,
# and commits the changes back to the repository.
# ===========================================
name: bump-version
on:
  # release:
  #   types: [published]    # Trigger on GitHub release publish
  workflow_run:             # auto-trigger after choco.yml
    workflows: ["choco"]    # must match the `name:` in choco.yml
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1)'
        required: false    # Optional manual trigger
permissions:
  contents: write       # Needed to push commits back
jobs:
  bump-version:
    runs-on: windows-latest
    # Logic: Only run if manually triggered OR if the automated upstream 'choco' run succeeded.
    if: >
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      # 1. Checkout the repository with full history to allow pushing commits
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1
        with:
          fetch-depth: 0
      # 1a. Write shared git helper to disk for use in subsequent steps
      - name: Write git helper
        shell: pwsh
        run: |
          @'
          # Helper: run git and abort the step immediately on any non-zero exit code.
          function Invoke-Git {
              param([Parameter(Mandatory=$true,ValueFromRemainingArguments=$true)][string[]]$GitArgs)
              & git @GitArgs
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "git $($GitArgs -join ' ') failed with exit $LASTEXITCODE"
                  exit $LASTEXITCODE
              }
          }
          '@ | Out-File -FilePath "$env:RUNNER_TEMP\git-helpers.ps1" -Encoding utf8
      # 2. Determine the tag/version to use, support multiple trigger sources via composite action
      - name: Set version vars
        uses: ./.github/actions/resolve-version
        with:
          manual_tag: ${{ github.event.inputs.tag }}

      # 2a. Calculate Next Target Minor Component Version
      - name: Compute next semantic increment
        shell: pwsh
        run: |
          # Calculate NEXT_VERSION: increment minor, roll over major if minor >= 9
          # Product follows decimal-point versioning, max 10 minor releases per major
          $parts = $env:VERSION.Split('.')
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          if ($minor -lt 9) {
              $minor++
          } else {
              $major++
              $minor = 0
          }
          $next_version = "$major.$minor"
          Write-Host "Next computed baseline deployment version: $next_version"
          Add-Content -Path $env:GITHUB_ENV -Value "NEXT_VERSION=$next_version"

      # 3. Bump version on main and net48 branches sequentially
      - name: Bump version on main and net48 branches
        shell: pwsh
        run: |
          . "$env:RUNNER_TEMP\git-helpers.ps1"

          # Configure user identity globally for the current loop runner context
          Invoke-Git config user.name "github-actions[bot]"
          Invoke-Git config user.email "github-actions[bot]@users.noreply.github.com"

          $branches = @("main", "net48")
          foreach ($branch in $branches) {
              Write-Host "Starting semantic version bump sequence for branch: $branch"

              # Fetch the branch tips safely without modifying active local branch head refs directly
              Invoke-Git fetch origin $branch
              Invoke-Git checkout -B $branch
              Invoke-Git reset --hard "origin/$branch"
              
              Invoke-Git update-index --chmod=+x ./bump-version.ps1
              ./bump-version.ps1 -Version $env:NEXT_VERSION
              if ($LASTEXITCODE -ne 0) { throw "bump-version.ps1 failed with exit $LASTEXITCODE on branch $branch" }

              # Using porcelain check consistently to prevent silent skips across branches.
              if (git status --porcelain) {
                  Invoke-Git add --all
                  Invoke-Git commit -m "chore: bump version from $env:VERSION to $env:NEXT_VERSION"
                  Invoke-Git push origin $branch
                  Write-Host "Successfully committed and pushed version updates to $branch"
              } else {
                  Write-Host "No changes detected on $branch branch, skipping commit."
              }
              
              Write-Host "Finished processing branch: $branch`n"
          }